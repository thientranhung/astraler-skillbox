appId: com.astraler.skillbox
productName: Astraler Skillbox
copyright: Copyright (c) 2026 Astraler
artifactName: astraler-skillbox-${version}-${arch}.${ext}
directories:
  output: dist
files:
  - out/**/*
  - package.json
asar: true
extraResources:
  - from: resources/core/skillbox-core
    to: core/skillbox-core
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  binaries:
    - Contents/Resources/core/skillbox-core
  target:
    - target: dmg
      arch:
        - arm64
