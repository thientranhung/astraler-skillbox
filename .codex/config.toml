[mcp_servers.stitch]
url = "https://stitch.googleapis.com/mcp"

# API key đọc từ biến môi trường STITCH_API_KEY (không hardcode secret vào repo).
# Set trong shell profile: export STITCH_API_KEY="<key>"
[mcp_servers.stitch.env_http_headers]
"X-Goog-Api-Key" = "STITCH_API_KEY"


[plugins."stitch-build@stitch-skills"]
enabled = true


[plugins."stitch-design@stitch-skills"]
enabled = true


[plugins."stitch-utilities@stitch-skills"]
enabled = true


[plugins."superpowers@openai-curated"]
enabled = true
