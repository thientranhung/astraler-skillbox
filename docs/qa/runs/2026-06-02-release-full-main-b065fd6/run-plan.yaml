execution_notes:
  - Run automated gates first and record command output under evidence/gates/.
  - Execute T0 cases before T1. Do not close T0 as blocked until safe UI/RPC/DB/filesystem paths have been attempted.
  - Execute T1 cases after T0 unless a T0 failure invalidates the environment.
  - Execute T2 release-full cases after T1 as release-risk discovery, not as primary GO blockers unless they reveal safety or misleading-state issues.
  - Mark packaged artifact, signing/notarization, Apple credential, and outbound network cases NEEDS_HUMAN when the exact artifact, credential, or owner-approved network action is unavailable.
  - Mark unsafe or unclear cases BLOCKED or NEEDS_HUMAN and propose a QA bank fix instead of forcing PASS.
