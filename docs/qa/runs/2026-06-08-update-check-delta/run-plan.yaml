run:
  id: 2026-06-08-update-check-delta
  date: 2026-06-08
  scope: delta
  profile: delta
  app_mode: dev-electron
  target_version: 0.1.2
  target_commit: c3a0037f1d28257533570a16d842919fe5c7c42c
  operator: qa-lead-quinn

environment:
  repo_root: <repo>
  desktop_dir: <repo>/apps/desktop
  fixture_source: <repo>/fixtures/qa
  fixture_copy: <repo>/docs/qa/runs/2026-06-08-update-check-delta/fixtures
  cdp_port: 49222
  qa_home: <repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-home
  qa_db_path: <repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-home/qa.db
  qa_host: <repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-host
  qa_project: <repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-project
  real_environment_allowed: false

selection:
  include_tiers: [T0, T1]
  include_tags: [update-check, app-update, plugin-update, privacy, network]
  exclude_tags: []
  case_ids:
    - TC-PRIVACY-002
    - TC-PLUGIN-005
    - TC-PLUGIN-009
    - TC-ABOUT-001
    - TC-ABOUT-002
    - TC-ABOUT-003
    - TC-PRIVACY-003

gates:
  fail_fast_on_t0: true
  require_t0_evidence: true
  plugin_real_toggle_requires_user_approval: true
  mutate_source_fixtures: false
  outbound_network_requires_user_approval: true
  outbound_network_policy:
    idle_launch: forbidden
    about_open_without_click: forbidden
    global_plugins_open_without_click: forbidden
    app_check_button: allowed_manual_trigger
    plugin_check_button: allowed_manual_trigger

commands:
  automated_gates:
    go_focused: "(cd core-go && go test ./internal/services/... ./internal/rpc/handlers/...)"
    desktop_focused: "(cd apps/desktop && pnpm test --run renderer/src/features/app-about/__tests__/use-check-app-update.test.tsx renderer/src/screens/__tests__/about-screen.test.tsx renderer/src/features/update-check/__tests__/use-run-update-check.test.tsx electron/main/core-process/__tests__/json-rpc-client.test.ts)"
    desktop_typecheck: "(cd apps/desktop && pnpm typecheck)"
    diff_check: "git diff --check"
  start_dev_app: "(cd apps/desktop && SKILLBOX_DB_PATH=<repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-home/qa.db HOME=<repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-home pnpm dev)"
  cdp_health: "curl -s http://127.0.0.1:49222/json/version"
  cdp_attach: "agent-browser connect 49222"
  db_update_cache_query: "sqlite3 <repo>/docs/qa/runs/2026-06-08-update-check-delta/qa-home/qa.db \"SELECT provider_key, plugin_name, marketplace_name, checked_at, error FROM plugin_update_check_cache ORDER BY checked_at;\""
  network_observation: "Use lsof/nettop/tcpdump or app logs to prove no non-local outbound network before manual update actions; record command and output in evidence."

notes:
  - "This is focused post-merge delta QA for PR #40 / commit c3a0037f."
  - "TC-ABOUT-001 and TC-ABOUT-003 must click the explicit About Check for Updates button; opening About alone must not trigger app.checkUpdate."
  - "If network blocking cannot be made reliable without affecting the whole developer machine, mark TC-ABOUT-003 or TC-PLUGIN-009 BLOCKED and propose a QA harness improvement."
  - "Do not use real user plugin/project/provider data. Use only run-local QA HOME, DB, copied fixtures, and explicit manual update actions."
