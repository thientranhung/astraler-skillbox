area: plugins
cases:
  - id: TC-PLUGIN-001
    title: Global Plugins scan shows provider settings status and plugin versions
    tier: T1
    primary_screen: Global Plugins
    related_screens: [Project Detail, Dashboard]
    type: smoke
    tags: [plugin, scan, version, global-plugins, release-full]
    invariants: [INV-PLUGIN-001]
    preconditions:
      - App runs with a QA fixture home or a user-approved read-only real environment.
      - At least one provider has plugin metadata available to scan.
    steps:
      - Open Global Plugins.
      - Run global plugin scan for a provider.
      - Inspect plugin rows and version column.
      - Open a Project Detail plugin section for the same provider if available.
    expected_ui:
      - Provider settings path and scan status are visible.
      - Plugin rows show name, marketplace/name metadata where available, enabled state, and version where available.
      - Malformed, missing, unreadable, too-large, symlink, or path-escape states are labeled clearly when present.
    cross_screen_checks:
      - Global Plugins and Project Detail agree on user-layer plugin facts for the same provider.
      - Dashboard plugin summary matches Global Plugins if displayed.
    verifier:
      filesystem:
        - Settings/cache files inspected by the app are under the approved QA fixture or approved read-only real paths.
      evidence:
        - Screenshot of Global Plugins after scan.
        - Filesystem path/status output for scanned settings/cache files.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_approved_read_only
      real_environment: allowed_read_only

  - id: TC-PLUGIN-002
    title: Toggle global plugin changes only the selected plugin state
    tier: T1
    primary_screen: Global Plugins
    related_screens: [Project Detail, Dashboard]
    type: smoke
    tags: [plugin, toggle, global-plugins, cross-screen, release-full]
    invariants: [INV-PLUGIN-001, INV-SAFETY-001]
    preconditions:
      - Provider supports write operations for plugin enabled state.
      - Target settings file is a QA fixture or the user explicitly approved this exact real plugin toggle.
      - A backup or before snapshot of the settings file has been captured.
    steps:
      - Open Global Plugins.
      - Choose one approved plugin row.
      - Toggle it off.
      - Rescan or wait for UI refresh.
      - Toggle it back on.
      - Open Project Detail plugin section for a project using the same provider.
    expected_ui:
      - Only the selected plugin row changes enabled/disabled state.
      - Version and marketplace metadata do not disappear because of the toggle.
      - Project Detail effective state reflects the same user-layer toggle or clearly shows a project override.
    cross_screen_checks:
      - Global Plugins and Project Detail agree on effective state unless an override is explicitly labeled.
      - Dashboard plugin counts update if displayed.
    verifier:
      filesystem:
        - Settings file before/after diff changes only the selected plugin key/state.
        - No unrelated provider or plugin settings are modified.
      evidence:
        - Screenshot after toggle off and after toggle on.
        - Before/after settings diff.
    safety:
      destructive: true
      allowed_environment: qa_fixture_or_explicit_opt_in
      real_environment: opt_in

  - id: TC-PLUGIN-003
    title: Project plugin override display stays consistent with global plugin state
    tier: T1
    primary_screen: Project Detail
    related_screens: [Global Plugins]
    type: smoke
    tags: [plugin, project-detail, override, effective-state, release-full]
    invariants: [INV-PLUGIN-001]
    preconditions:
      - QA project has provider plugin fixture data for user and project layers.
      - At least one plugin has different user and project layer states.
    steps:
      - Open Project Detail.
      - Inspect Provider Plugins section for the provider.
      - Open Global Plugins for the same provider.
      - Return to Project Detail.
    expected_ui:
      - Project Detail shows user, project, and effective plugin columns or equivalent state.
      - Project cells without an override show an explicit "No override" control, not a bare dash that looks non-interactive.
      - Override state is understandable and not collapsed into a misleading global-only state.
      - Global Plugins shows only global/user layer state, not project override as if it were global.
    cross_screen_checks:
      - Effective state in Project Detail derives from the displayed user/project layer facts.
      - Global Plugins user state matches Project Detail user column for the same plugin.
    verifier:
      filesystem:
        - User settings fixture and project settings fixture contain the expected differing states.
      evidence:
        - Screenshot of Project Detail plugin section.
        - Screenshot of Global Plugins row.
        - Fixture settings snippets with sensitive values redacted.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-PLUGIN-004
    title: Malformed plugin settings file is reported without overwriting it
    tier: T1
    primary_screen: Global Plugins
    related_screens: [Project Detail]
    type: edge
    tags: [plugin, malformed-settings, scan, safety, release-full]
    invariants: [INV-PLUGIN-001, INV-SAFETY-001]
    preconditions:
      - QA fixture provider settings file is malformed.
      - The malformed file has a before snapshot.
    steps:
      - Open Global Plugins.
      - Scan the affected provider.
      - Open a project plugin section if it references the same provider.
    expected_ui:
      - Global Plugins shows malformed or unreadable status.
      - App does not crash.
      - App does not claim plugin enabled/version facts from invalid data.
      - Project Detail does not show stale effective state as current without warning.
    cross_screen_checks:
      - Global Plugins and Project Detail agree that the provider/plugin data is not trustworthy.
    verifier:
      filesystem:
        - Malformed settings file content is unchanged after scan.
      evidence:
        - Screenshot of malformed state.
        - Before/after checksum or diff for settings file.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PLUGIN-005
    title: Plugin update checks are manual-trigger only and surface per-plugin results
    tier: T1
    primary_screen: Global Plugins
    related_screens: [About, Dashboard]
    type: edge
    tags: [plugin, update-check, network, privacy, release-full]
    invariants: [INV-SAFETY-001]
    preconditions:
      - App runs in QA dev Electron mode.
      - Network observation is available through logs, proxy, or OS tooling.
    steps:
      - Launch the app and wait on Dashboard without clicking plugin update actions.
      - Open Global Plugins without clicking Check Updates.
      - Observe outbound network activity.
      - Click the explicit plugin Check Updates action if present and user approved network use.
      - If plugins are present, inspect the plugin table for per-plugin result badges.
    expected_ui:
      - App remains usable offline.
      - Plugin update checks do not run before the explicit user action.
      - Manual check shows a per-plugin result or error badge (not just a single global pass/fail).
      - A toast after check completion reflects per-plugin outcome (e.g. "X plugins could not be checked" when errors occur, not "All plugins up to date" when all checks failed).
      - Plugin rows with update available show "↑ update" badge.
      - Plugin rows where check failed show a specific error badge (e.g. "Check timed out", "Network error").
    cross_screen_checks:
      - About App Updates section is distinct from Global Plugins update check.
    verifier:
      evidence:
        - Network/log evidence before manual action.
        - Screenshot of plugin table after check showing per-plugin result badges.
        - Screenshot of toast showing accurate failure count when checks fail.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only

  - id: TC-PLUGIN-009
    title: Plugin update check shows per-plugin progress and terminal states
    tier: T1
    primary_screen: Global Plugins
    related_screens: []
    type: edge
    tags: [plugin, update-check, error-state, per-plugin, release-full]
    invariants: [INV-SAFETY-001]
    preconditions:
      - App runs in QA dev Electron mode.
      - At least one plugin is present in the plugin list.
      - Network can be throttled or blocked to simulate failure/timeout.
    steps:
      - Open Global Plugins.
      - Block or throttle outbound git access (e.g. use network proxy, firewall, or offline mode).
      - Click Check Updates.
      - Wait for the check to complete (should not take longer than ~35s).
      - Inspect the plugin table and the toast notification.
    expected_ui:
      - Check completes within ~35s (batch deadline is 30s plus goroutine overhead).
      - Per-plugin error badges appear for each plugin that could not be checked.
      - Error badge label is specific (e.g. "Check timed out" for timeout, "Network error" for git failure).
      - Toast does not say "All plugins up to date" when all checks failed.
      - Toast message accurately reflects partial or total failure count.
    verifier:
      evidence:
        - Screenshot of plugin table with per-plugin error badges.
        - Screenshot of toast message.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only

  - id: TC-PLUGIN-006
    title: Project plugin override disagreeing with global is labeled as override and not drift
    tier: T1
    primary_screen: Project Detail
    related_screens: [Global Plugins]
    type: edge
    tags: [plugin, project-override, global-plugin, cross-screen, release-full]
    invariants: [INV-PLUGIN-001, INV-DB-001]
    preconditions:
      - QA home uses the copied run-local global plugin fixture.
      - QA project has project-level plugin settings that intentionally disagree with global state.
    data_setup:
      fixture_sources:
        - fixtures/qa/global-plugin
        - fixtures/qa/projects/project-plugin-override
      copy_to:
        global_plugin_home: runs/<run-id>/fixtures/global-plugin
        project_plugin_override: runs/<run-id>/fixtures/projects/project-plugin-override
      mutate_copy:
        - use `runs/<run-id>/fixtures/global-plugin` as QA HOME for this case
        - keep project plugin settings with a different enabled/version state than the QA global fixture
    steps:
      - Configure QA HOME to the copied global plugin fixture.
      - Add or open the project-plugin-override QA project.
      - Run Global Plugins scan.
      - Run project plugin scan if needed.
      - Compare Global Plugins and Project Detail plugin sections.
    expected_ui:
      - Project Detail labels project-level disagreement as an override or scoped project state.
      - Global Plugins continues to show global/user layer facts only.
      - UI does not present the disagreement as unexplained drift or a global mutation.
    cross_screen_checks:
      - Project Detail effective state derives from visible global and project layer facts.
      - Global Plugins row matches the global fixture, not the project override.
    verifier:
      app_db:
        - Plugin facts are stored separately by global/user and project layer.
        - Effective project state matches the project override where applicable.
      filesystem:
        - Global and project settings fixture files remain unchanged.
      evidence:
        - Project Detail plugin override screenshot.
        - Global Plugins screenshot.
        - DB query output for plugin layer facts.
        - Fixture settings snippets or checksums.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PLUGIN-007
    title: Missing provider settings file shows no-plugins state without inventing versions
    tier: T1
    primary_screen: Global Plugins
    related_screens: [Dashboard]
    type: edge
    tags: [plugin, missing-settings, no-plugins, data-integrity, release-full]
    invariants: [INV-PLUGIN-001, INV-DB-001]
    preconditions:
      - QA provider global settings path points to a run-local missing file.
    data_setup:
      fixture_source: fixtures/qa/global/plugin-settings-missing
      copy_to: runs/<run-id>/fixtures/global/plugin-settings-missing
      mutate_copy:
        - keep the expected provider settings file absent in the run-local copy
    steps:
      - Configure provider global settings path to the absent run-local settings file.
      - Open Global Plugins.
      - Run plugin scan.
      - Open Dashboard.
    expected_ui:
      - Global Plugins shows a no-plugins, missing-settings, or equivalent empty state.
      - No plugin versions, enabled states, or update facts are invented from prior scans.
      - Scan reaches a terminal state.
    cross_screen_checks:
      - Dashboard plugin summaries match Global Plugins missing/no-plugin state where displayed.
    verifier:
      app_db:
        - Plugin layer scan status records missing or empty settings according to contract.
        - No plugin entry/version row is created from the absent settings file.
      filesystem:
        - Missing settings file remains absent unless the product explicitly creates it through a user save action.
      evidence:
        - Global Plugins screenshot after scan.
        - DB query output for plugin layer scan and plugin entries.
        - "`test -e` output for the missing settings path."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PLUGIN-010
    title: Global Plugins provider tabs prioritize Shared Agents without aggregate views
    tier: T2
    primary_screen: Global Plugins
    related_screens: []
    type: smoke
    tags: [plugin, provider-tabs, counts, empty-state, release-full]
    invariants: [INV-PLUGIN-001]
    preconditions:
      - App has scanned global plugins with at least two providers, including Shared Agents (one with plugins, one without).
    steps:
      - Open Global Plugins.
      - Run global plugin scan if not yet scanned.
      - Inspect the provider tab bar.
      - Click each provider tab.
    expected_ui:
      - Shared Agents is the default selected provider view.
      - No "All" aggregate tab is visible.
      - Each provider has its own tab showing its plugin count (may be 0).
      - Provider tabs show provider icons.
      - Clicking a provider tab shows only that provider's plugin view.
      - A provider with 0 plugins shows a "no plugins" or empty state in its tab view.
    verifier:
      evidence:
        - Screenshot of Global Plugins tab bar with all provider tabs and counts.
        - Screenshot of a single-provider tab view.
        - Screenshot of a provider tab with 0 plugins showing empty state.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only
