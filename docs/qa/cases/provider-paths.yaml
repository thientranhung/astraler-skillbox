area: provider-paths
cases:
  - id: TC-PROVIDER-001
    title: Project provider path override changes only selected provider slot
    tier: T1
    primary_screen: Settings
    related_screens: [Projects, Project Detail]
    type: smoke
    tags: [provider, path-override, settings, project-scan, release-full]
    invariants: [INV-PROVIDER-001, INV-PROJECT-001]
    preconditions:
      - QA project contains a provider folder at a non-default relative path.
    steps:
      - Open Settings provider paths.
      - Override one provider project detect and skills path to the QA non-default relative paths.
      - Scan the QA project.
      - Reset the override.
    expected_ui:
      - Override is visible in Settings.
      - Project scan uses the override while it is active.
      - Reset returns the slot to built-in defaults.
      - Other providers' paths are unchanged.
    verifier:
      app_db:
        - Provider path override row exists only for the selected provider/scope/purpose.
        - Override row is removed or reset after reset action.
      filesystem:
        - No files are written outside the QA project.
      evidence:
        - Settings override screenshot.
        - Project Detail after scan.
        - DB provider_path_overrides output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PROVIDER-002
    title: Invalid project provider override is rejected before scan
    tier: T0
    primary_screen: Settings
    related_screens: [Projects]
    type: adversarial
    tags: [provider, path-override, path-escape, validation, release-full]
    invariants: [INV-PROVIDER-001, INV-SAFETY-001]
    preconditions:
      - App runs with QA DB.
    steps:
      - Open Settings provider path editor.
      - "Attempt to save a project-scope path override containing `..` or an absolute path."
      - Inspect Projects and DB.
    expected_ui:
      - UI shows a validation error and does not save the override.
      - Project scan behavior is unchanged.
    verifier:
      app_db:
        - No provider_path_overrides row exists for the rejected path.
      evidence:
        - Validation error screenshot.
        - DB override absence query.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PROVIDER-003
    title: Global provider config override stays inside approved QA home
    tier: T1
    primary_screen: Settings
    related_screens: [Global Plugins]
    type: smoke
    tags: [provider, global-config, plugin, settings, release-full]
    invariants: [INV-PROVIDER-001, INV-PLUGIN-001]
    preconditions:
      - QA home contains a provider settings file at a non-default absolute path.
    steps:
      - Override provider global config path to the QA settings file.
      - Run Global Plugins scan.
      - Reset the override.
    expected_ui:
      - Global Plugins reads from the override path while active.
      - Reset returns to the QA HOME default path.
      - No real user settings path is inspected.
    verifier:
      app_db:
        - Override row points to the QA fixture path only.
        - Plugin layer scan path matches the override while active.
      evidence:
        - Settings screenshot.
        - Global Plugins screenshot.
        - DB provider_path_overrides and plugin layer scan output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PROVIDER-004
    title: Provider disablement does not delete project provider folders
    tier: T0
    primary_screen: Settings
    related_screens: [Project Detail]
    type: critical
    tags: [provider, disable, filesystem, data-integrity, release-full]
    invariants: [INV-PROVIDER-001, INV-SAFETY-001]
    preconditions:
      - QA project contains provider folder and at least one observed skill entry.
    steps:
      - Open Settings.
      - Disable the provider.
      - Open Project Detail and scan if allowed.
      - Re-enable the provider.
    expected_ui:
      - Disabled state is clear.
      - Project provider folders and entries are not deleted.
      - Re-enabled provider can be scanned again.
    verifier:
      filesystem:
        - Provider folder and skill entries remain on disk.
      app_db:
        - Provider enabled state changes only for the selected provider.
      evidence:
        - Settings screenshot before/after.
        - Filesystem listing.
        - DB provider settings output.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-005
    title: Unknown provider key is rejected without metadata drift
    tier: T2
    primary_screen: Settings
    related_screens: [Provider Registry]
    type: adversarial
    tags: [provider, validation, unknown-provider, release-full]
    invariants: [INV-PROVIDER-001, INV-DB-001]
    preconditions:
      - App runs with QA DB.
    steps:
      - Attempt to update paths or enablement for an unknown provider key through the same app surface or RPC harness used by QA.
      - Refresh Settings.
    expected_ui:
      - Unknown provider is rejected with a clear validation error.
      - No orphan provider setting or override row is created.
    verifier:
      app_db:
        - Provider definition and override tables contain no unknown-provider row.
      evidence:
        - Error output or UI screenshot.
        - DB query output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PROVIDER-006
    title: Scan of provider marker without skills folder claims no phantom skills
    tier: T0
    primary_screen: Project Detail
    related_screens: [Projects, Dashboard]
    type: adversarial
    tags: [provider, partial-structure, detection, missing-folder, data-integrity, release-full]
    invariants: [INV-PROJECT-001, INV-DB-001]
    preconditions:
      - "QA project fixture has `.agents/` but intentionally does not have `.agents/skills/`."
      - QA executor may mutate only the run-local project fixture.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - remove the .agents/skills directory, leaving .agents present
    steps:
      - Open Project Detail and run Scan Project.
      - Open Projects and Dashboard.
    expected_ui:
      - Provider is shown as present but with an incomplete or empty skills structure.
      - No installed or available skills are claimed under the missing skills folder.
      - Scan reaches a terminal state and the UI does not stay stuck scanning.
    cross_screen_checks:
      - Projects row, Project Detail, and Dashboard agree the provider has zero current skills.
    verifier:
      app_db:
        - Provider detection row records the present marker without a usable skills path, or marks the skills structure incomplete.
        - No skill or install row exists for skills under the absent `.agents/skills`.
      filesystem:
        - "`.agents` exists and `.agents/skills` is absent in the run-local fixture."
        - No files are written outside the run-local QA project fixture.
      evidence:
        - Project Detail screenshot after scan.
        - DB query output for provider facts and skill/install rows.
        - "`test -d` output for `.agents` and `.agents/skills`."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-007
    title: Provider skills path that is a file or broken symlink scans without drift
    tier: T1
    primary_screen: Project Detail
    related_screens: [Projects]
    type: adversarial
    tags: [provider, partial-structure, negative-topology, broken-symlink, data-integrity, release-full]
    invariants: [INV-PROJECT-001, INV-OPERATION-001, INV-DB-001]
    preconditions:
      - QA executor may mutate only the run-local project fixture.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - replace .agents/skills with a regular file (variant A) or a symlink to a deleted target (variant B)
    steps:
      - Run the case once per variant (file, broken symlink).
      - Open Project Detail and run Scan Project.
    expected_ui:
      - Scan reaches a terminal empty or error state for the malformed skills path.
      - The UI does not stay stuck scanning and does not claim usable skills.
    verifier:
      app_db:
        - No skill or install row is created from the malformed skills path.
        - No scan operation remains queued or running after completion.
      filesystem:
        - The malformed node is unchanged by the scan in the run-local fixture.
        - No files are written outside the run-local QA project fixture.
      evidence:
        - Project Detail screenshot after scan for each variant.
        - DB query output for skill/install/operation rows.
        - "`stat` and `readlink` output for the malformed `.agents/skills` node."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-008
    title: Skills folder deleted just before install reaches a terminal state without hanging
    tier: T1
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard]
    type: adversarial
    tags: [provider, live-mutation, install, operation-state, race, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA host has one valid available skill not yet installed in the QA project.
      - "`generic_agents` is the selected install provider. It is allowed to recreate `.agents/skills`."
      - QA executor may mutate only the run-local project fixture.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - "leave `.agents/skills` well-formed (the case mutates it live during steps)"
    steps:
      - Open Project Detail and run Scan Project so the provider is detected.
      - Open Add Skill, select the Shared Agent Skills provider, and select one not-installed host skill.
      - Remove the `.agents/skills` directory from the run-local fixture outside the app.
      - Click Install and wait for the operation to reach a terminal state.
    expected_ui:
      - Install reaches a terminal state (success or failure), never an indefinite Installing state.
      - On terminal success the wizard reports the skill installed and Project Detail shows it.
      - On terminal failure the wizard shows a clear error and the skill is not shown installed.
      - A success message appears only after `.agents/skills` and the skill target exist on disk.
    verifier:
      app_db:
        - On terminal success, an active install record exists for the project, provider, skill, and mode.
        - On terminal failure, no active install record exists.
        - In both outcomes, no operation for the install remains queued or running after completion.
      filesystem:
        - On terminal success, `.agents/skills` was recreated and the skill target exists under it.
        - On terminal failure, no partial or orphan target is left under the QA project fixture.
        - The UI install state and the on-disk skill target agree (no success shown without the target).
        - No files are written outside the run-local QA project fixture and QA host folder.
      evidence:
        - Wizard screenshot at terminal state.
        - DB query output for operation and install rows.
        - "`test -d` for `.agents/skills` and `readlink`/`stat` for the skill target after the attempt."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-011
    title: Reset of an active override restores built-in path with no file deletion or target rewrite
    tier: T0
    primary_screen: Settings
    related_screens: [Project Detail, Projects]
    type: critical
    tags: [provider, path-override, reset, filesystem, data-integrity, release-full]
    invariants: [INV-PROVIDER-001, INV-PROJECT-001, INV-INSTALL-001, INV-SAFETY-001]
    preconditions:
      - QA project has a provider path override that points to a run-local alternate provider path.
      - The same QA project also has the provider built-in path populated with distinct fixture content.
      - QA executor may mutate only the run-local project fixture.
    data_setup:
      fixture_source: fixtures/qa/provider-overrides/project-with-override
      copy_to: runs/<run-id>/fixtures/provider-overrides/project-with-override
      mutate_copy:
        - keep both the built-in provider path and override provider path present with distinct fixture markers
    steps:
      - Open Settings provider path overrides.
      - Verify the active project-scope override is visible.
      - Open Project Detail and scan the project while the override is active.
      - Return to Settings and reset the override.
      - Scan the same Project Detail again.
      - Inspect both provider paths outside the app.
    expected_ui:
      - Settings clearly shows the override before reset and the built-in path after reset.
      - Project Detail uses the override path before reset and the built-in path after reset.
      - Reset does not claim to delete, migrate, or rewrite either provider folder.
      - Scan reaches a terminal state after reset and does not show stale override facts as current.
    cross_screen_checks:
      - Settings, Projects, and Project Detail agree on whether the override is active.
    verifier:
      app_db:
        - Provider path override row exists before reset and is removed or marked reset after reset.
        - Project provider facts after the final scan point to the built-in path, not the old override path.
        - No active install record is silently re-targeted from the override path to the built-in path without a user install/switch action.
      filesystem:
        - Built-in provider path still exists and its marker content is unchanged.
        - Override provider path still exists and its marker content is unchanged.
        - No files are deleted, moved, or rewritten outside the run-local provider-overrides fixture.
      evidence:
        - Settings screenshot before and after reset.
        - Project Detail screenshot before and after final scan.
        - DB query output for provider_path_overrides, project provider facts, and installs.
        - "`find`, `stat`, and checksum output for both provider paths before and after reset."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-009
    title: Two providers detected in one project keep independent path and skill facts
    tier: T1
    primary_screen: Project Detail
    related_screens: [Projects, Settings]
    type: smoke
    tags: [provider, multi-provider, project-scan, path-facts, release-full]
    invariants: [INV-PROVIDER-001, INV-PROJECT-001, INV-DB-001]
    preconditions:
      - QA project fixture contains Shared Agent Skills and Claude provider markers.
      - Provider path settings use built-in defaults.
    data_setup:
      fixture_source: fixtures/qa/projects/project-multi-provider
      copy_to: runs/<run-id>/fixtures/projects/project-multi-provider
      mutate_copy:
        - keep `.agents/skills` and `.claude/skills` as independent provider paths
    steps:
      - Add or open the multi-provider QA project.
      - Run Scan Project.
      - Inspect each provider section in Project Detail.
      - Open Settings provider path definitions.
    expected_ui:
      - Each provider shows its own detected path and skills path.
      - A warning, count, or install state under one provider does not appear under the other provider.
      - Settings defaults remain unchanged by scan.
    cross_screen_checks:
      - Project Detail and Projects row agree on the set of detected providers.
    verifier:
      app_db:
        - Project provider fact rows are keyed by distinct provider definitions.
        - Each provider row stores its own detected path and skills path.
      filesystem:
        - Both provider paths exist and remain unchanged.
      evidence:
        - Project Detail screenshot showing both provider facts.
        - DB query output for project provider facts.
        - Filesystem listing for each provider path.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-PROVIDER-010
    title: Provider disabled after install hides current state without deleting install records
    tier: T1
    primary_screen: Settings
    related_screens: [Project Detail, Skills Library]
    type: edge
    tags: [provider, disable, install, data-integrity, release-full]
    invariants: [INV-PROVIDER-001, INV-INSTALL-001, INV-SAFETY-001]
    preconditions:
      - QA project has one managed install for the provider being disabled.
      - QA executor may mutate only run-local fixture copies.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - use the project-with-install template with one seeded provider install
    steps:
      - Open Settings.
      - Disable the provider with the existing install.
      - Open Project Detail and Skills Library.
      - Re-enable the provider and rescan the project.
    expected_ui:
      - Disabled state is clear in Settings.
      - Project Detail does not show disabled-provider installs as current active actions while the provider is disabled.
      - The provider folder and install target are not deleted.
      - Re-enabled provider can rescan and recover the install state.
    cross_screen_checks:
      - Settings, Project Detail, and Skills Library agree before disable, during disable, and after re-enable.
    verifier:
      app_db:
        - Provider enabled state changes only for the selected provider.
        - Existing install metadata remains present or is explicitly hidden/disabled, not deleted as a side effect.
      filesystem:
        - Provider folder and install target remain on disk throughout disable/re-enable.
      evidence:
        - Settings and Project Detail screenshots before/after disable and after re-enable.
        - DB query output for provider enabled state and install rows.
        - Filesystem `stat` output for provider folder and install target.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROVIDER-012
    title: Enable or disable one provider does not change other providers' enabled state or paths
    tier: T1
    primary_screen: Settings
    related_screens: [Project Detail]
    type: edge
    tags: [provider, enable-disable, settings, isolation, multi-provider, release-full]
    invariants: [INV-PROVIDER-001, INV-DB-001, INV-SAFETY-001]
    preconditions:
      - QA DB has at least two provider definitions visible in Settings.
      - QA run uses only fixture provider paths or settings.
    data_setup:
      fixture_source: fixtures/qa/multi-provider-settings
      copy_to: runs/<run-id>/fixtures/multi-provider-settings
      mutate_copy:
        - keep provider settings fixture read-only; use QA DB state for provider enablement
    steps:
      - Open Settings provider list.
      - Record enabled state and paths for at least two providers.
      - Disable one provider.
      - Re-enable that provider.
      - Open Project Detail for a multi-provider QA project if available.
    expected_ui:
      - Only the selected provider's enabled state changes.
      - Other providers keep their enabled state and configured paths.
      - Project Detail reflects only the selected provider's disabled/enabled state.
    cross_screen_checks:
      - Settings and Project Detail agree on selected provider state and unaffected provider state.
    verifier:
      app_db:
        - Provider setting row changes only for the selected provider key.
        - Provider path override rows for other providers are unchanged.
      filesystem:
        - No provider folders or settings files are deleted or rewritten by enable/disable.
      evidence:
        - Settings screenshots before disable, after disable, and after re-enable.
        - DB query output for provider settings and overrides before/after.
        - Filesystem stat output for any referenced QA fixture paths.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden
