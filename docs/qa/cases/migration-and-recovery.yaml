area: migration-and-recovery
cases:
  - id: TC-MIGRATE-001
    title: Existing older QA DB migrates to current schema on launch
    tier: T1
    primary_screen: App Launch
    related_screens: [Dashboard, Settings]
    type: smoke
    tags: [migration, db, launch, release-full]
    invariants: [INV-DB-001]
    preconditions:
      - QA run includes a copied DB fixture from a supported older schema version.
    steps:
      - "Launch app with `SKILLBOX_DB_PATH` pointing to the older QA DB copy."
      - Wait for Setup or Dashboard.
      - Open Settings.
    expected_ui:
      - App launches without migration error.
      - Settings shows the current database version.
      - Existing supported data remains visible or is upgraded according to migration contract.
    verifier:
      app_db:
        - Schema migration version is current.
        - "`PRAGMA integrity_check` returns `ok`."
      evidence:
        - Launch screenshot.
        - Settings screenshot.
        - DB migration/version query output.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-MIGRATE-002
    title: Migration failure does not fall back to real app data
    tier: T0
    primary_screen: App Launch
    related_screens: [Setup]
    type: critical
    tags: [migration, db, safety, launch, release-full]
    invariants: [INV-DB-001, INV-SAFETY-001]
    preconditions:
      - QA run includes an intentionally invalid migration fixture DB under the run folder.
    steps:
      - "Launch app with `SKILLBOX_DB_PATH` pointing to the invalid QA DB."
      - Observe startup error.
      - Inspect real app-data path if available read-only.
    expected_ui:
      - Error is visible.
      - App does not silently create or use the user's real app DB.
      - Configured QA DB path is the only DB touched.
    verifier:
      filesystem:
        - QA DB path is under the run folder.
        - No real app-data DB timestamp changes.
      evidence:
        - Startup error screenshot or log.
        - Filesystem timestamp output.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-MIGRATE-003
    title: Crash during operation recovers without stale success state
    tier: T0
    primary_screen: Dashboard
    related_screens: [Projects, Skills Library]
    type: critical
    tags: [recovery, crash, operation, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-DB-001]
    preconditions:
      - QA run can terminate the dev app process during a long-running fixture operation.
    steps:
      - Start a scan or install operation.
      - Terminate the app process during the operation.
      - Relaunch with the same QA DB.
      - Open the affected screen.
    expected_ui:
      - Operation is not shown as still running forever.
      - No partial operation is shown as successful unless verified complete.
      - User can retry the workflow.
    verifier:
      app_db:
        - Interrupted operation is failed/cancelled/stale according to contract.
        - No active install row exists for partial failed install.
      filesystem:
        - Partial targets are absent or clearly classified as unmanaged/conflict.
      evidence:
        - Relaunch screenshot.
        - Operations/install DB output.
        - Filesystem listing.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-MIGRATE-004
    title: App restart preserves completed scan metadata and warnings
    tier: T1
    primary_screen: Dashboard
    related_screens: [Projects, Skills Library, Global Plugins]
    type: smoke
    tags: [restart, persistence, warning, release-full]
    invariants: [INV-DB-001, INV-PROJECT-001, INV-PLUGIN-001]
    preconditions:
      - QA run has completed host, project, and plugin scans with at least one warning.
    steps:
      - Quit app normally.
      - Relaunch with the same QA DB and QA HOME.
      - Open Dashboard, Projects, Skills Library, and Global Plugins.
    expected_ui:
      - Completed scan timestamps remain visible.
      - Warning state persists until resolved by a later scan/action.
      - Counts remain coherent after restart.
    verifier:
      app_db:
        - Scan and warning rows persist across restart.
      evidence:
        - Screenshots after restart.
        - DB scan/warning query output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-MIGRATE-005
    title: Partial interrupted migration is reported without touching real app data
    tier: T0
    primary_screen: App Launch
    related_screens: [Setup, Dashboard]
    type: critical
    tags: [migration, db, interrupted-migration, recovery, safety, release-full]
    invariants: [INV-DB-001, INV-SAFETY-001]
    preconditions:
      - QA run creates a dirty migration DB under the run folder using the committed partial-migration fixture script.
      - The generated dirty DB is the only configured DB path.
      - QA executor may inspect real app-data paths read-only only for timestamp comparison.
    data_setup:
      fixture_source: fixtures/qa/db/partial-migration
      copy_to: runs/<run-id>/fixtures/db/partial-migration
      mutate_copy:
        - "run `fixtures/qa/db/partial-migration/create-dirty-db.sh runs/<run-id>/fixtures/db/partial-migration/qa-partial-migration.db`"
    steps:
      - Launch app with `SKILLBOX_DB_PATH` pointing to the generated dirty migration QA DB.
      - Observe startup until Setup, Dashboard, or a migration error appears.
      - If the app reports an error, quit and relaunch once with the same generated QA DB.
      - Run DB and filesystem checks out of band.
    expected_ui:
      - App never silently falls back to the user's real app DB.
      - App either completes recovery to the current schema or reports a clear dirty/partial migration error.
      - If recovery completes, Setup or Dashboard is usable and no stale partial-migration banner remains.
      - If recovery fails, the error is visible and specific enough to block release.
    verifier:
      app_db:
        - Configured QA DB remains under the run folder.
        - "Before launch, `schema_migrations` contains `version = 23` and `dirty = 1`."
        - "`PRAGMA integrity_check` returns `ok` if the app reports recovery success."
        - Schema migration version is current if recovery succeeds.
        - If the app reports a dirty migration error, the generated QA DB remains dirty and no alternate DB is used.
        - No half-applied migration metadata remains if recovery succeeds.
      filesystem:
        - Real app-data DB path is not created or timestamp-modified by this launch.
        - No files are written outside the run-local DB fixture and QA home.
      evidence:
        - Startup or migration-error screenshot.
        - Output from `create-dirty-db.sh`.
        - DB migration/version/integrity query output.
        - Filesystem timestamp/path check for QA DB and real app-data DB path.
        - Relaunch log if the first launch reports a recoverable error.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden
