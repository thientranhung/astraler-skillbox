area: about
cases:
  - id: TC-ABOUT-001
    title: About App Updates shows up-to-date state when on latest version
    tier: T1
    primary_screen: About
    related_screens: []
    type: smoke
    tags: [about, app-update, up-to-date, release-full]
    invariants: []
    preconditions:
      - App runs in dev Electron mode with network access.
      - GitHub Releases for astraler-skillbox has a latest release matching the current app version.
      - App version.go matches apps/desktop/package.json version.
    steps:
      - Open About screen.
      - Wait for automatic check to complete, or click Check for Updates.
      - Observe the App Updates section.
    expected_ui:
      - App Updates section header is clearly labeled "App Updates" (not "Updates" or "Plugin Updates").
      - After check completes, status shows "You're up to date ✓".
      - No "New version available!" or update link is shown.
      - Current version is displayed correctly.
    verifier:
      evidence:
        - Screenshot of About screen with up-to-date state.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only

  - id: TC-ABOUT-002
    title: About app update surface is clearly distinct from plugin update surface
    tier: T1
    primary_screen: About
    related_screens: [Global Plugins]
    type: smoke
    tags: [about, app-update, plugin-update, distinction, release-full]
    invariants: []
    preconditions:
      - App runs in dev Electron mode.
    steps:
      - Open About screen.
      - Note the section header and button label for app update.
      - Open Global Plugins.
      - Note the section header and button label for plugin update.
      - Compare both surfaces.
    expected_ui:
      - About screen shows "App Updates" section header.
      - About screen button says "Check for Updates" and is scoped to the app binary.
      - Global Plugins shows a separate "Check Updates" button scoped to installed plugins.
      - The two update surfaces use distinct labels and are not visually combined.
      - No text in About implies it also checks plugin versions.
    cross_screen_checks:
      - Triggering app update check does not alter plugin update state shown in Global Plugins.
    verifier:
      evidence:
        - Screenshot of About App Updates section.
        - Screenshot of Global Plugins Check Updates button.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only

  - id: TC-DIAG-001
    title: Export Diagnostics and Copy Diagnostics are user-triggered and contain no secrets or skill contents
    tier: T1
    primary_screen: About
    related_screens: []
    type: smoke
    tags: [about, diagnostics, privacy, local-first, release-full]
    invariants: [INV-PRIVACY-001]
    release_scope: manual
    notes: Native Save Dialog cannot be driven by CDP. Automated release-full may verify Copy to Clipboard plus source/unit coverage for dialog.exportDiagnostics; mark the export-save substep NEEDS_HUMAN unless a human chooses the save path or a documented Electron-main harness stubs the save dialog.
    preconditions:
      - App runs in dev Electron mode.
      - At least one provider path is configured so the DB path is deterministic.
    steps:
      - Open About screen.
      - Observe the Diagnostics section with Export and Copy buttons.
      - Click "Copy to Clipboard".
      - Paste clipboard contents into a text editor.
      - Inspect the pasted text.
      - Click "Export Diagnostics…".
      - NEEDS_HUMAN or harness bypass: choose a save path in the native Save Dialog, or verify dialog.exportDiagnostics via an Electron-main test/harness that stubs the save dialog and filesystem write.
      - Open the exported file in a text editor.
      - Inspect the exported text.
    expected_ui:
      - Diagnostics section is visible under App Updates in the About screen.
      - Export and Copy buttons are present and enabled.
      - After Copy, button briefly shows "Copied!" confirmation.
      - After Export, button briefly shows "Saved" confirmation and no error is shown.
      - The diagnostic text includes app version, platform info, and DB path.
      - The DB path is displayed with home directory replaced by "~" (not the absolute path).
      - The text does not contain any skill file contents or plugin file contents.
      - No automatic network request is triggered by clicking either button.
    verifier:
      filesystem:
        - Exported .txt file exists at the chosen path.
        - File content includes "=== Astraler Skillbox Diagnostics ===" header.
        - File content does not contain the user's absolute home directory path.
      evidence:
        - Screenshot of About screen showing Diagnostics section.
        - Content of exported or pasted diagnostics text (redacted if needed).
        - Human save-dialog evidence or Electron-main harness/source-inspection output for dialog.exportDiagnostics.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only

  - id: TC-ABOUT-003
    title: About Check Updates handles network failure gracefully
    tier: T1
    primary_screen: About
    related_screens: []
    type: edge
    tags: [about, app-update, network-failure, offline, release-full]
    invariants: []
    preconditions:
      - App runs in dev Electron mode.
      - Network can be blocked or the GitHub API URL can be made unreachable (e.g. offline mode, proxy block).
    steps:
      - Block outbound network or put machine offline.
      - Open About screen.
      - Wait for automatic check to attempt, or click Check for Updates.
      - Observe the App Updates section.
    expected_ui:
      - App does not crash or hang.
      - App remains fully usable (all navigation, settings, skills still work).
      - After check fails, the error message is specific and user-readable (e.g. "No internet connection — could not reach GitHub.").
      - Status does not show "You're up to date ✓" or "New version available!" when check failed.
      - Check for Updates button re-enables after failure so the user can retry.
    verifier:
      evidence:
        - Screenshot of About screen with specific network failure message.
        - Confirm app navigation still works after the failed check.
    safety:
      destructive: false
      allowed_environment: qa_fixture_or_read_only
      real_environment: allowed_read_only
