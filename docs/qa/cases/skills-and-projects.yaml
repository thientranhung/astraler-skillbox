  - id: TC-PROJ-011
    title: Global Skills list and Project Detail effective skills agree
    tier: T1
    primary_screen: Project Detail
    related_screens: [Global Skills]
    type: cross-screen
    tags: [project, global-skills, effective-skills, cross-screen, consistency, release-full]
    invariants: [INV-PROJECT-001, INV-INSTALL-001]
    preconditions:
      - App has a configured QA Skill Host Folder.
      - A global scan has been run producing at least one active global provider location with entries.
    steps:
      - Open Global Skills screen and record all active provider locations and their entry names.
      - Navigate to Project Detail for a QA project.
      - Inspect the Global Skills section.
    expected_ui:
      - Every active provider location entry visible on the Global Skills screen for a provider currently detected or configured in the project also appears in the Project Detail Global Skills section.
      - Provider display names shown in Project Detail Global Skills match those shown on the Global Skills screen.
      - Entry names shown in Project Detail Global Skills match those on the Global Skills screen for the same provider.
      - Active global entries for providers missing or invalid in the project are not shown as affecting that project.
    fail_criteria:
