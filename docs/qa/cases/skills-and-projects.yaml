      - Locate the Global Skills section.
      - Inspect the Global Skills section entries and compare with the Skill Entries section.
    expected_ui:
      - A "Global Skills" section heading is visible in Project Detail.
      - The Global Skills section lists global skill entries grouped by provider display name.
      - Each global entry shows a "global" provenance badge.
