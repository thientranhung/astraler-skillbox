      - Inspect the Providers section.
      - Inspect the filesystem of the QA project folder after viewing the detail.
    expected_ui:
      - Providers section shows a guidance message explaining how to create provider folders manually.
      - Guidance text mentions at least one provider folder example (e.g., .agents/skills or .claude/skills).
      - No empty state simply says "No providers detected" without guidance.
