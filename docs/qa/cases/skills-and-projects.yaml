    tags: [project, no-provider, guidance, filesystem-safety, release-full]
    invariants: [INV-PROJECT-001, INV-SAFETY-001]
    preconditions:
      - App has a configured QA Skill Host Folder.
      - QA project folder has no provider folders (no .agents/skills, no .claude/skills, etc.).
      - QA project is added to Skillbox and scanned.
    steps:
