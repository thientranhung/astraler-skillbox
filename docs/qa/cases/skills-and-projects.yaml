area: skills-and-projects
cases:
  - id: TC-PROJ-001
    title: Add project and scan provider state, including no-provider guidance
    tier: T1
    primary_screen: Projects
    related_screens: [Project Detail, Dashboard]
    type: smoke
    tags: [project, add-project, scan, no-provider, cross-screen, release-full]
    invariants: [INV-PROJECT-001]
    preconditions:
      - App has a configured QA Skill Host Folder.
      - QA project folder A has at least one provider folder.
      - QA project folder B has no provider folders.
    steps:
      - Open Projects.
      - Add QA project folder A (with providers).
      - Run project scan if it does not happen automatically.
      - Open Project Detail for folder A.
      - Return to Projects.
      - Add QA project folder B (no providers).
      - Open Project Detail for folder B.
      - Return to Dashboard.
    expected_ui:
      - Projects list shows both added project paths.
      - Project Detail for folder A shows detected providers.
      - Project Detail for folder B shows no-provider guidance with folder creation instructions.
      - Project Detail for folder B does not claim any provider is detected.
      - No provider folders are auto-created in folder B by the app.
    cross_screen_checks:
      - Dashboard project totals match Projects list.
      - Project Detail provider facts match Projects row summary.
    verifier:
      app_db:
        - Project rows exist for both folders.
        - Provider scan facts match the UI summary.
      filesystem:
        - No files are written outside the selected QA project folders.
        - No provider folders are created in folder B by the app.
      evidence:
        - Screenshot of Projects row and Project Detail for folder A (with providers).
        - Screenshot of Project Detail for folder B showing no-provider guidance.
        - DB query output for project and provider facts.
        - "`find` output for folder B confirming no provider folders created."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-PROJ-002
    title: Project Detail auto-scan does not duplicate operations or noisy toasts
    tier: T1
    primary_screen: Project Detail
    related_screens: [Projects]
    type: edge
    tags: [project, auto-scan, operation-state, toast, release-full]
    invariants: [INV-PROJECT-001]
    preconditions:
      - QA project exists in Skillbox.
      - Project scan state is stale or has never been scanned.
    steps:
      - Open Project Detail.
      - Wait for initial data load.
      - Navigate away and back once.
      - Click manual Scan Project.
    expected_ui:
      - At most one auto-scan starts for the same project during the mount cycle.
      - Auto-scan does not show success/loading toast.
      - Manual scan remains available and shows normal manual feedback.
      - UI does not stay stuck in scanning state.
    cross_screen_checks:
      - Projects row reflects the final scan state after manual scan completes.
    verifier:
      app_db:
        - Project scan timestamp updates after scan completion.
      evidence:
        - Screenshot or DOM snapshot during and after scan.
        - Operation/log evidence if available.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-PROJ-003
    title: Rescan marks removed provider folders missing
    tier: T0
    primary_screen: Project Detail
    related_screens: [Projects, Dashboard]
    type: critical
    tags: [project, provider, scan, stale-state, data-integrity, release-full]
    invariants: [INV-PROJECT-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA project has a detected provider folder and at least one scanned provider install.
      - QA executor may mutate only the run-local project fixture.
    steps:
      - Open Project Detail and verify the provider is detected.
      - Remove the provider folder from the run-local QA project fixture outside the app.
      - Run Scan Project again.
      - Open Projects and Dashboard.
    expected_ui:
      - Project Detail no longer presents the deleted provider as current.
      - Provider state is shown as missing, or the screen shows a clear no-current-provider state.
      - Deleted provider paths are not displayed as live/current paths.
      - Installed skill counts do not include installs under the missing provider.
      - Manual scan reaches a terminal success or error state and the UI does not stay stuck scanning.
    cross_screen_checks:
      - Projects row, Project Detail, and Dashboard agree that the provider is no longer current.
    verifier:
      app_db:
        - "`project_providers.detection_status` is `missing` for the deleted provider."
        - "`project_providers.detected_path` and `skills_path` are null for the missing provider."
        - Installs under the missing provider have `install_status = missing`.
      filesystem:
        - Deleted provider folder is absent from the QA project fixture.
        - No files are written outside the run-local QA project fixture.
      evidence:
        - Screenshot before and after rescan.
        - DB query output for provider facts and install statuses.
        - Filesystem `test -e` output for the deleted provider folder.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-001
    title: Skills Library scan shows host skills accurately
    tier: T1
    primary_screen: Skills Library
    related_screens: [Dashboard, Skill Detail]
    type: smoke
    tags: [skills-library, host, scan, cross-screen, release-full]
    invariants: [INV-HOST-001]
    preconditions:
      - QA Skill Host Folder contains at least two valid skill folders.
    steps:
      - Open Skills Library.
      - Run Scan Skill Host Folder.
      - Open one Skill Detail.
      - Return to Dashboard.
    expected_ui:
      - Skills Library shows the expected host skills.
      - Skill Detail path/name/provider metadata matches the selected skill.
      - Dashboard host skill count matches Skills Library.
    cross_screen_checks:
      - Dashboard and Skills Library agree on host skill count.
      - Skill Detail matches the selected row.
    verifier:
      app_db:
        - Skill rows exist for the expected QA host skills.
      filesystem:
        - Listed skills exist under the configured QA host folder.
      evidence:
        - Screenshot of Skills Library and Skill Detail.
        - DB query output for skills.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-SKILL-002
    title: Add Skill Wizard installs selected host skill by symlink
    tier: T0
    primary_screen: Project Detail
    related_screens: [Skills Library, Skill Detail, Dashboard]
    type: critical
    tags: [skill, add-skill, install, symlink, data-integrity, release-full]
    invariants: [INV-INSTALL-001, INV-HOST-001]
    preconditions:
      - QA host has one valid skill not yet installed in the QA project.
      - QA project has a provider target folder for the active provider, or the active provider explicitly supports creating its target structure.
    steps:
      - Open Project Detail.
      - Open Add Skill.
      - Select the provider tab.
      - Select one not-installed skill.
      - Choose or accept symlink mode.
      - Click Install.
      - Open Skills Library and Skill Detail for the installed skill.
    expected_ui:
      - Add Skill shows provider tabs for detected providers.
      - Already installed skills, if any, are disabled and labeled Installed.
      - Install success is shown only after the filesystem write succeeds.
      - Project Detail shows the skill as installed with mode symlink.
      - Skills Library or Skill Detail reflects the project install state.
    cross_screen_checks:
      - Project Detail, Skills Library, Skill Detail, and Dashboard agree on installed state/counts where displayed.
    verifier:
      app_db:
        - Active install record exists for the project, provider, skill, and symlink mode.
      filesystem:
        - Provider target symlink exists.
        - "`readlink` target points to the QA host skill folder."
        - Host skill folder still exists.
      evidence:
        - Screenshot after install.
        - "`readlink` and `stat` output."
        - DB query output for install row.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-007
    title: Shared Agent install creates missing skills folder without hanging
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard, Skills Library]
    type: critical
    tags: [skill, add-skill, install, provider, missing-folder, operation-state, symlink, release-full]
    invariants: [INV-INSTALL-001, INV-OPERATION-001, INV-DB-001, INV-SAFETY-001]
    preconditions:
      - QA host has one valid available skill not yet installed in the QA project.
      - QA project fixture has `.agents/` but intentionally does not have `.agents/skills/`.
      - "`generic_agents` is the selected install provider."
    steps:
      - Open Project Detail and run Scan Project.
      - Open Add Skill.
      - Select the Shared Agent Skills provider tab.
      - Select one not-installed host skill.
      - Click Install.
      - Wait for the install operation to reach a terminal state.
      - Close the wizard and re-open Project Detail.
    expected_ui:
      - Add Skill offers the Shared Agent Skills provider for the detected `.agents` marker.
      - Install remains visibly in progress only while the operation is running.
      - The wizard does not stay stuck in Installing after the operation reaches a terminal state.
      - A success message appears only after `.agents/skills` and the skill target exist.
      - Project Detail shows the installed skill with mode symlink.
    cross_screen_checks:
      - Project Detail and Skills Library agree on the installed state.
    verifier:
      app_db:
        - Active install record exists for the project, provider, skill, and symlink mode.
        - No operation for the install remains queued or running after completion.
      filesystem:
        - "`.agents/skills` exists under the QA project fixture."
        - Provider target symlink exists under `.agents/skills`.
        - "`readlink` target points to the QA host skill folder."
        - No files are written outside the run-local QA project fixture and QA host folder.
      evidence:
        - Screenshot of the wizard during install and after terminal state.
        - DB query output for operation and install rows.
        - "`test -d`, `readlink`, and `stat` output for `.agents/skills` and target symlink."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-003
    title: Remove installed skill deletes project target without deleting host skill
    tier: T0
    primary_screen: Project Detail
    related_screens: [Skills Library, Skill Detail, Dashboard]
    type: critical
    tags: [skill, remove, symlink, data-integrity, destructive, release-full]
    invariants: [INV-INSTALL-001, INV-INSTALL-002, INV-HOST-001]
    preconditions:
      - QA project has one skill installed by symlink from QA host.
    steps:
      - Open Project Detail.
      - Click Remove for the installed skill.
      - Confirm removal.
      - Open Skills Library or Skill Detail for the same skill.
    expected_ui:
      - Project Detail no longer shows the skill as installed for that provider.
      - Skills Library or Skill Detail no longer marks this project as installed.
      - UI does not show success if filesystem removal failed.
    cross_screen_checks:
      - Dashboard installed totals update if displayed.
      - Project Detail and Skills Library agree on installed state.
    verifier:
      app_db:
        - Active install record is removed or marked removed according to current schema.
      filesystem:
        - Project provider target symlink no longer exists.
        - QA host skill folder still exists.
      evidence:
        - Screenshot after removal.
        - Filesystem check output for target and host.
        - DB query output for install state.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-004
    title: Switch install mode replaces only the project target
    tier: T0
    primary_screen: Project Detail
    related_screens: [Skills Library, Skill Detail]
    type: critical
    tags: [skill, switch-mode, symlink, copy, data-integrity, phase2]
    phase: phase2
    invariants: [INV-INSTALL-001, INV-INSTALL-002]
    preconditions:
      - QA project has one skill installed by symlink or copy.
      - The alternate install mode is available for the provider target.
    steps:
      - Open Project Detail.
      - Open Switch mode for the installed skill.
      - Switch from symlink to rsync/copy, or from rsync/copy to symlink.
      - Confirm the operation.
      - Reopen the same Project Detail row and Skill Detail.
    expected_ui:
      - Mode label changes to the selected mode after success.
      - UI does not show both modes as active.
      - Errors are visible if the target cannot be safely replaced.
    cross_screen_checks:
      - Skills Library or Skill Detail agrees with Project Detail on mode/status.
    verifier:
      app_db:
        - Install record mode matches the selected mode.
      filesystem:
        - Project target type matches the selected mode.
        - Old project target is not left behind as a conflicting active install.
        - QA host skill folder remains intact.
      evidence:
        - Screenshot after switch.
        - "`stat`/`readlink`/`find` output for project target."
        - DB query output for install mode.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-011
    title: Copy-mode install writes the skill into the project target and records mode=copy
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard, Skills Library, Dashboard]
    type: critical
    tags: [skill, add-skill, install, copy, rsync-copy, data-integrity, phase2]
    phase: phase2
    invariants: [INV-INSTALL-001, INV-INSTALL-002, INV-HOST-001, INV-DB-001]
    preconditions:
      - QA host has one valid skill not yet installed in the QA project.
      - QA project has a detected provider target that supports Copy (rsync) install mode.
      - QA executor may mutate only the run-local project fixture and QA host fixture.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - use the project-with-provider template with an empty provider skills directory
    steps:
      - Open Project Detail.
      - Open Add Skill.
      - Select one not-installed QA host skill.
      - Choose Copy (rsync) mode.
      - Click Install and wait for the operation to reach a terminal state.
      - Open Skills Library and Dashboard.
    expected_ui:
      - Install remains in progress only while the operation is running.
      - Success is shown only after the project target folder exists.
      - Project Detail shows the skill installed with Copy (rsync) mode, not symlink mode.
      - Skills Library and Dashboard counts agree with the Project Detail state.
    cross_screen_checks:
      - Project Detail, Skills Library, and Dashboard agree on the installed state and mode.
    verifier:
      app_db:
        - Active install record exists for the project, provider, skill, and `install_mode = rsync_copy`.
        - No operation for the install remains queued or running after completion.
      filesystem:
        - Project target is a real directory or copied file tree, not a symlink.
        - Copied target content matches the QA host skill at install time.
        - QA host skill folder remains intact.
        - No files are written outside the run-local release-cycle fixture.
      evidence:
        - Wizard terminal-state screenshot and Project Detail screenshot.
        - DB query output for install mode and operation state.
        - "`test -d`, `test ! -L`, `find`, and checksum/stat output for copied target and host skill."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-012
    title: Switch from symlink to copy and back replaces only the target while host stays intact
    tier: T0
    primary_screen: Project Detail
    related_screens: [Skills Library, Skill Detail, Dashboard]
    type: critical
    tags: [skill, switch-mode, symlink, copy, rsync-copy, data-integrity, phase2]
    phase: phase2
    invariants: [INV-INSTALL-001, INV-INSTALL-002, INV-HOST-001, INV-DB-001]
    preconditions:
      - QA project has one managed symlink install from the QA host.
      - The same provider target supports Copy (rsync) mode and switching back to symlink.
      - QA executor may mutate only the run-local project fixture and QA host fixture.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - use the project-with-install template seeded with one symlink install from the QA host
    steps:
      - Open Project Detail.
      - Switch the installed skill from symlink to Copy (rsync).
      - Wait for the switch operation to reach a terminal state.
      - Verify the row shows Copy (rsync).
      - Switch the same skill back to symlink.
      - Open Skills Library, Skill Detail, and Dashboard.
    expected_ui:
      - Each switch reaches one terminal state and never leaves the row stuck switching.
      - Mode label changes to Copy (rsync) after the first switch and symlink after the second switch.
      - UI never shows both modes active for the same project/provider/skill target.
      - Errors, if any, are visible and do not show a false success state.
    cross_screen_checks:
      - Project Detail, Skills Library, Skill Detail, and Dashboard agree on the final symlink install state and counts.
    verifier:
      app_db:
        - After the first switch, the active install row has `install_mode = rsync_copy`.
        - After the second switch, the active install row has `install_mode = symlink`.
        - No duplicate active install row exists for the same project/provider/skill.
        - No switch operation remains queued or running after completion.
      filesystem:
        - Copy-mode target is not a symlink after the first switch.
        - Final target is a symlink whose `readlink` points to the QA host skill.
        - Old project target content is not left behind as a conflicting active install.
        - QA host skill folder remains intact.
      evidence:
        - Project Detail screenshots after each switch.
        - DB query output after each switch for install mode and operation state.
        - "`stat`, `readlink`, and `find` output for the target after each switch."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-005
    title: Install conflict surfaces error without partial DB success
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard]
    type: adversarial
    tags: [skill, install, conflict, error, data-integrity, release-full]
    invariants: [INV-INSTALL-001]
    preconditions:
      - QA project provider target already has a folder or file at the skill install path.
      - The conflicting target is not a valid managed install.
    steps:
      - Open Project Detail.
      - Open Add Skill.
      - Select the conflicting skill.
      - Click Install.
    expected_ui:
      - Wizard shows a clear install error near the footer.
      - No success toast appears.
      - Install button recovers or stays safely disabled according to the error state.
    cross_screen_checks:
      - Project Detail does not show the skill as installed after the failed attempt.
    verifier:
      app_db:
        - No active install record is created for the failed install.
      filesystem:
        - Existing conflicting file/folder remains unchanged.
        - No extra partial target is created.
      evidence:
        - Screenshot of install error.
        - DB query output for install absence.
        - Filesystem `stat` output for conflict target.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SKILL-006
    title: Broken project symlink is reported as a warning after scan
    tier: T1
    primary_screen: Project Detail
    related_screens: [Dashboard, Projects]
    type: edge
    tags: [skill, broken-symlink, scan, warning, release-full]
    invariants: [INV-INSTALL-001, INV-PROJECT-001]
    preconditions:
      - QA project contains a provider skill symlink whose target no longer exists.
    steps:
      - Open Project Detail.
      - Run Scan Project.
      - Open Dashboard and Projects.
    expected_ui:
      - Project Detail does not crash.
      - Broken symlink appears with a warning or broken status.
      - User sees an action such as rescan, relink, or remove.
    cross_screen_checks:
      - Dashboard/Projects warnings reflect the broken project state where those summaries exist.
    verifier:
      filesystem:
        - "`readlink` target is missing."
      evidence:
        - Screenshot of broken state.
        - "`readlink` and missing-target check output."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-SKILL-008
    title: Skill with missing or malformed SKILL.md is listed as invalid and not usable
    tier: T1
    primary_screen: Skills Library
    related_screens: [Add Skill Wizard]
    type: edge
    tags: [skills-library, invalid-skill, malformed-frontmatter, validation, release-full]
    invariants: [INV-HOST-001, INV-SAFETY-001]
    preconditions:
      - QA run uses the malformed host fixture as the active Skill Host Folder.
    data_setup:
      fixture_source: fixtures/qa/host-topologies/malformed-md
      copy_to: runs/<run-id>/fixtures/host-topologies/malformed-md
      mutate_copy:
        - keep one skill folder without `SKILL.md` and one with malformed frontmatter
    steps:
      - Open Skills Library.
      - Run Skill Host Folder scan.
      - Open Add Skill for a QA project.
    expected_ui:
      - Malformed entries are shown as invalid, ignored with warning, or otherwise not offered as valid installable skills.
      - Add Skill Wizard does not allow installing malformed entries.
      - Scan reaches a terminal state and the UI does not stay stuck.
    verifier:
      app_db:
        - Invalid host entries are absent from active installable skill rows or are marked invalid/warning according to contract.
        - No active install record can be created for the malformed entries.
      filesystem:
        - Malformed fixture folders are unchanged by scan.
      evidence:
        - Skills Library screenshot after scan.
        - Add Skill Wizard screenshot or DOM snapshot.
        - DB query output for skill rows/warnings.
        - Filesystem listing for malformed entries.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SKILL-009
    title: Duplicate skill names across host are disambiguated without collision in install
    tier: T1
    primary_screen: Skills Library
    related_screens: [Add Skill Wizard, Project Detail]
    type: edge
    tags: [skills-library, duplicate-name, install, data-integrity, release-full]
    invariants: [INV-HOST-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA run uses the duplicate-name host fixture as the active Skill Host Folder.
      - QA project has a detected provider target.
    data_setup:
      fixture_source: fixtures/qa/host-topologies/duplicate-names
      copy_to: runs/<run-id>/fixtures/host-topologies/duplicate-names
      mutate_copy:
        - keep two distinct skill folders with the same frontmatter `name`
    steps:
      - Open Skills Library and scan the duplicate-name host.
      - Open Add Skill for the QA project.
      - Install one of the duplicate-name entries.
      - Open Project Detail.
    expected_ui:
      - Duplicate display names are disambiguated by path, folder, warning, or other visible metadata.
      - Installing one duplicate does not mark the other duplicate as installed.
      - Project Detail shows only the selected source path as installed.
    cross_screen_checks:
      - Skills Library, Add Skill Wizard, and Project Detail agree on which duplicate source was installed.
    verifier:
      app_db:
        - Skill rows for duplicate folders have distinct IDs/source paths.
        - Active install row points to the selected duplicate skill ID only.
      filesystem:
        - Project target points to or contains only the selected duplicate source.
        - Both duplicate source folders remain intact.
      evidence:
        - Skills Library duplicate rows screenshot.
        - Project Detail screenshot after install.
        - DB query output for skill IDs/source paths and install row.
        - "`readlink`/`stat` output for the project target."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROJ-004
    title: Project folder moved after add reports missing without losing the record
    tier: T1
    primary_screen: Projects
    related_screens: [Project Detail, Dashboard]
    type: edge
    tags: [project, missing-path, external-mutation, data-integrity, release-full]
    invariants: [INV-PROJECT-001, INV-DB-001]
    preconditions:
      - QA project is registered from a run-local fixture path.
      - QA executor may rename or move only the run-local project fixture.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - start with a valid registered project fixture
    steps:
      - Open Projects and confirm the project is listed.
      - Move or rename the run-local project folder outside the app.
      - Refresh Projects or run scan.
      - Open Project Detail and Dashboard.
    expected_ui:
      - Project remains listed as a known project record.
      - Missing path status or warning is visible.
      - Project Detail does not claim current provider facts from the moved folder.
      - User has a visible recovery action such as rescan, relink, or remove record.
    cross_screen_checks:
      - Projects, Project Detail, and Dashboard agree on missing project state.
    verifier:
      app_db:
        - Project row remains present with missing/stale scan state rather than being silently deleted.
      filesystem:
        - Original project path is absent and moved path exists under the run folder.
      evidence:
        - Projects and Project Detail screenshots.
        - DB query output for project row and scan state.
        - "`test -e` output for original and moved paths."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-PROJ-005
    title: Adding the same project path twice does not create a duplicate record
    tier: T1
    primary_screen: Projects
    related_screens: [Dashboard, Project Detail]
    type: edge
    tags: [project, add-project, duplicate, data-integrity, release-full]
    invariants: [INV-PROJECT-001, INV-DB-001]
    preconditions:
      - QA project fixture exists and is safe to add.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - keep a single valid project path for duplicate-add attempts
    steps:
      - Open Projects.
      - Add the QA project path.
      - Attempt to add the exact same path again.
      - Open Dashboard and Project Detail.
    expected_ui:
      - Second add is rejected, ignored, or focuses the existing project with a clear message.
      - Projects list shows one row for the path.
      - Dashboard project count is not incremented by the duplicate attempt.
    cross_screen_checks:
