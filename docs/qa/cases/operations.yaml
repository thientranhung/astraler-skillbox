area: operations
cases:
  - id: TC-OPS-001
    title: Host scan operation cannot duplicate for the same host target
    tier: T1
    primary_screen: Skills Library
    related_screens: [Dashboard]
    type: edge
    tags: [operation, host-scan, duplicate, release-full]
    invariants: [INV-OPERATION-001, INV-HOST-001]
    preconditions:
      - QA host folder contains enough fixture entries for scan progress to be observable.
    steps:
      - Open Skills Library.
      - Trigger Scan Skill Host Folder.
      - Immediately trigger scan again if the UI permits.
      - Wait for terminal state.
    expected_ui:
      - At most one active host scan is running for the same host.
      - Duplicate trigger is disabled or returns a clear conflict state.
      - UI leaves loading state after terminal success/failure.
    verifier:
      app_db:
        - Operations table has no overlapping running host scan operations for the same target.
      evidence:
        - Screenshot during scan and after terminal state.
        - Operations table output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-OPS-002
    title: Project scan operation cannot duplicate for the same project target
    tier: T1
    primary_screen: Project Detail
    related_screens: [Projects]
    type: edge
    tags: [operation, project-scan, duplicate, release-full]
    invariants: [INV-OPERATION-001, INV-PROJECT-001]
    preconditions:
      - QA project is registered.
    steps:
      - Open Project Detail.
      - Trigger Scan Project.
      - Trigger Scan Project again before the first scan completes if possible.
      - Wait for terminal state.
    expected_ui:
      - Duplicate scan is prevented or returns a clear conflict state.
      - Projects row reflects the final scan result.
      - UI does not show multiple success toasts for one user action.
    verifier:
      app_db:
        - Operations table has no overlapping running project scan operations for the same project.
      evidence:
        - DOM snapshot or screenshot during scan.
        - Operations table output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-OPS-003
    title: Cancel long-running scan returns UI to a safe retry state
    tier: T1
    primary_screen: Skills Library
    related_screens: [Dashboard]
    type: edge
    tags: [operation, cancel, retry, release-full]
    invariants: [INV-OPERATION-001]
    preconditions:
      - QA host fixture has enough entries or a harness delay so scan cancellation is possible.
    steps:
      - Start a host or project scan.
      - Click Cancel if the UI exposes it, or cancel via the operation cancel command in the QA harness.
      - Retry the scan.
    expected_ui:
      - Cancelled operation is visibly cancelled or returns to idle.
      - Retry is possible and reaches terminal state.
      - No stale spinner or disabled controls remain.
    verifier:
      app_db:
        - Operation status transitions to cancelled, then a later retry reaches success or failed.
      evidence:
        - Screenshot after cancel.
        - Operations table output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-OPS-004
    title: Stale running operations are marked failed after app restart
    tier: T0
    primary_screen: Dashboard
    related_screens: [Projects, Skills Library]
    type: critical
    tags: [operation, restart, stale-state, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-DB-001]
    preconditions:
      - QA DB contains a synthetic queued/running operation from a prior crash, or the app is killed during a fixture operation.
    steps:
      - Launch app with the QA DB.
      - Open Dashboard, Projects, and Skills Library.
      - Inspect operation state.
    expected_ui:
      - App does not remain stuck in a prior running state.
      - Stale operation is marked failed with a restart explanation.
      - User can run a fresh scan.
    verifier:
      app_db:
        - Stale queued/running operation status becomes failed.
      evidence:
        - App launch screenshot.
        - Operations table output before/after launch.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-OPS-005
    title: Operation failure surfaces error without false success toast
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard]
    type: adversarial
    tags: [operation, failure, toast, install, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-INSTALL-001]
    preconditions:
      - QA project contains a fixture conflict that makes install fail.
    steps:
      - Start the conflicting install flow.
      - Observe operation feedback.
      - Return to Project Detail.
    expected_ui:
      - Error is visible.
      - No success toast appears for the failed operation.
      - Project Detail does not show the failed skill as current/installed.
    verifier:
      app_db:
        - Operation status is failed.
        - No active install record exists for the failed write.
      filesystem:
        - Conflict target remains unchanged.
      evidence:
        - Error screenshot.
        - DB operation/install query output.
        - Filesystem stat output.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-OPS-006
    title: Install and remove operations cannot duplicate for the same skill and provider target
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard, Dashboard]
    type: critical
    tags: [operation, duplicate, install, remove, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA project has one detected provider target and one not-installed QA host skill.
      - QA project also has one managed install that can be removed.
      - QA executor may mutate only the run-local project fixture and QA host fixture.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - use the project-with-provider template plus one seeded managed install for remove deduplication
    steps:
      - Open Project Detail and Add Skill.
      - Trigger Install for one not-installed skill.
      - Immediately trigger the same Install action again if the UI permits, or call the same install command through the QA harness.
      - Wait for terminal state.
      - Trigger Remove for one managed install.
      - Immediately trigger the same Remove action again if the UI permits, or call the same remove command through the QA harness.
      - Wait for terminal state and return to Project Detail.
    expected_ui:
      - Duplicate install and remove triggers are disabled, ignored, or return a clear conflict state.
      - Only one terminal success or failure is shown per target operation.
      - UI does not leave the affected row stuck installing or removing.
      - Final Project Detail state matches the completed operation result.
    cross_screen_checks:
      - Dashboard install counts match Project Detail after both operation attempts complete.
    verifier:
      app_db:
        - Operations table has no overlapping queued/running install operation for the same project/provider/skill target.
        - Operations table has no overlapping queued/running remove operation for the same install target.
        - At most one active install row exists for the installed project/provider/skill.
        - Removed target has no active install row after successful remove.
      filesystem:
        - Install target exists at most once after install completion.
        - Removed target is absent after successful remove, while the QA host skill remains intact.
        - No files are written outside the run-local release-cycle fixture.
      evidence:
        - Screenshots during duplicate attempts and after terminal state.
        - DB query output for operations and installs.
        - Filesystem listing for the install/remove targets and host skill.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-OPS-007
    title: App restart during a running install resolves to a terminal state with consistent DB and filesystem
    tier: T0
    primary_screen: Project Detail
    related_screens: [Dashboard, Skills Library]
    type: critical
    tags: [operation, restart, crash, install, recovery, data-integrity, release-full]
    invariants: [INV-OPERATION-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA run generates the committed large copy-mode fixture skill in the run-local release-cycle fixture.
      - QA project has one detected provider target and one not-installed QA host skill.
      - QA executor may mutate only the run-local project fixture and QA host fixture.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - "run `fixtures/qa/release-cycle/scripts/create-large-copy-skill.sh runs/<run-id>/fixtures/release-cycle 512`"
        - use the generated `zz-large-copy-skill` with the project-with-provider template
    steps:
      - Launch dev Electron with QA DB and QA HOME.
      - Open Project Detail and start installing `zz-large-copy-skill` in Copy (rsync) mode.
      - Poll operation state out of band until the install operation is queued or running.
      - Terminate the app process while the install operation is still queued or running.
      - Relaunch with the same QA DB and QA HOME.
      - Open Dashboard, Project Detail, and Skills Library.
    expected_ui:
      - Relaunched app does not show the interrupted install as running forever.
      - Interrupted operation is shown as failed, cancelled, stale, or retryable according to the product contract.
      - A success state is shown only if the filesystem target and DB install record both prove completion.
      - User can retry or cleanly remove any partial state.
    cross_screen_checks:
      - Dashboard, Project Detail, and Skills Library agree on whether the skill is installed after restart.
    verifier:
      app_db:
        - No operation for the interrupted install remains queued or running after relaunch recovery.
        - If an active install row exists, its target exists on disk and operation status is terminal success.
        - If the operation recovered as failed/cancelled/stale, no active install row exists for the partial target.
      filesystem:
        - Partial target is absent, or is classified as unmanaged/conflict and not shown as active success.
        - QA host skill folder remains intact.
        - No files are written outside the run-local release-cycle fixture.
      evidence:
        - Output from `create-large-copy-skill.sh`, including generated size and path.
        - Screenshot before termination if possible and screenshots after relaunch.
        - DB query output for operations and installs before/after relaunch.
        - Filesystem listing/stat output for the project target and host skill after relaunch.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden
