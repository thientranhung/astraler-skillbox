area: setup-and-settings
cases:
  - id: TC-SETUP-001
    title: First launch chooses Skill Host Folder and opens the main app
    tier: T1
    primary_screen: Setup
    related_screens: [Dashboard, Skills Library, Settings]
    type: smoke
    tags: [setup, host, onboarding, cross-screen]
    invariants: [INV-HOST-001]
    preconditions:
      - App runs in QA dev Electron mode with a throwaway DB.
      - QA host folder exists and is safe to modify.
    steps:
      - Launch the app with no existing app settings.
      - Choose the QA Skill Host Folder.
      - Continue into the main app.
      - Open Settings and Skills Library.
    expected_ui:
      - Setup screen no longer blocks the app.
      - Dashboard is reachable.
      - Settings shows the selected Skill Host Folder path.
      - Skills Library reflects the host scan state.
    cross_screen_checks:
      - Dashboard and Settings agree on the configured host path or host warning.
      - Skills Library state matches the actual host folder contents.
    verifier:
      app_db:
        - App settings contain the selected Skill Host Folder path.
      filesystem:
        - QA host folder still exists.
        - If the app creates `.agents/skills`, it is created only under the QA host folder.
      evidence:
        - Screenshot of Settings after setup.
        - DB query output for app settings.
        - "`find` or `ls` output for the QA host folder."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETUP-002
    title: Missing Skill Host Folder shows warnings without crashing
    tier: T1
    primary_screen: Dashboard
    related_screens: [Settings, Skills Library]
    type: edge
    tags: [setup, host, missing-path, warning]
    invariants: [INV-HOST-001]
    preconditions:
      - App has a configured QA Skill Host Folder.
      - The configured folder is moved or deleted outside the app.
    steps:
      - Launch the app.
      - Open Dashboard.
      - Open Settings.
      - Open Skills Library.
    expected_ui:
      - App does not crash.
      - Dashboard or Settings shows a clear missing host warning.
      - Skills Library does not show stale skills as current without a warning.
      - User has a visible path recovery action.
    cross_screen_checks:
      - Dashboard, Settings, and Skills Library agree that the host is missing.
    verifier:
      filesystem:
        - Configured host path is absent.
      evidence:
        - Screenshot of warning state.
        - Filesystem check output for the missing path.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETTINGS-001
    title: Change Skill Host Folder updates source of truth without relinking silently
    tier: T1
    primary_screen: Settings
    related_screens: [Dashboard, Skills Library, Project Detail]
    type: smoke
    tags: [settings, host, change-host, cross-screen]
    invariants: [INV-HOST-001, INV-INSTALL-001]
    preconditions:
      - App uses QA host folder A.
      - QA host folder B exists with a distinct skill list.
      - At least one project install may still point to host folder A.
    steps:
      - Open Settings.
      - Change Skill Host Folder to folder B.
      - Open Dashboard.
      - Open Skills Library.
      - Open a project with an existing install from folder A, if present.
    expected_ui:
      - Settings shows folder B as the current host.
      - Skills Library shows skills from folder B, not stale folder A contents.
      - Existing symlinks to folder A are not silently rewritten without user action.
      - Any old-host state is visible as a warning or distinct status.
    cross_screen_checks:
      - Dashboard and Skills Library agree on the new host scan state.
      - Project Detail does not claim old-host symlinks are current under folder B.
    verifier:
      app_db:
        - App settings contain host folder B.
      filesystem:
        - Folder A and folder B both remain intact.
        - Existing project symlink targets are unchanged unless a relink action was explicitly performed.
      evidence:
        - Screenshot of Settings and Skills Library.
        - DB query output for app settings.
        - "`readlink` output for any existing project symlink."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETTINGS-002
    title: Reset All Data clears Skillbox metadata without deleting real skill folders
    tier: T0
    primary_screen: Settings
    related_screens: [Setup, Dashboard, Skills Library, Projects, Global Plugins]
    type: critical
    tags: [settings, reset, data-integrity, destructive]
    invariants: [INV-HOST-001, INV-SAFETY-001]
    preconditions:
      - App runs with QA DB and QA fixture folders only.
      - QA host folder has at least one skill.
      - QA project has at least one scanned or installed skill.
    steps:
      - Open Settings.
      - Trigger Reset All Data from Danger Zone.
      - Confirm the destructive prompt.
      - Observe the app after reset.
      - Reopen Dashboard, Skills Library, Projects, and Global Plugins.
    expected_ui:
      - App returns to first-run or unconfigured state.
      - Projects and plugin scan data are gone from the UI.
      - No success state claims that filesystem sources were deleted.
    cross_screen_checks:
      - Dashboard, Projects, Skills Library, and Settings agree on the reset state.
    verifier:
      app_db:
        - Projects, skills, scan history, installs, and plugin scan tables are empty or reset.
        - App settings and network settings are at defaults.
      filesystem:
        - QA host skill folder still exists.
        - QA project folder still exists.
        - Provider config files are not modified unless the reset contract explicitly says so.
      evidence:
        - Screenshot after reset.
        - DB table count output.
        - "`find` output showing QA fixture folders still exist."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden
