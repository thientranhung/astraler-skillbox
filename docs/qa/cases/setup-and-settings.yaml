area: setup-and-settings
cases:
  - id: TC-SETUP-001
    title: First launch chooses Skill Host Folder and opens the main app
    tier: T1
    primary_screen: Setup
    related_screens: [Dashboard, Skills Library, Settings]
    type: smoke
    tags: [setup, host, onboarding, cross-screen, release-full]
    invariants: [INV-HOST-001]
    preconditions:
      - App runs in QA dev Electron mode with a throwaway DB.
      - QA host folder exists and is safe to modify.
    steps:
      - Launch the app with no existing app settings.
      - Choose the QA Skill Host Folder.
      - Continue into the main app.
      - Open Settings and Skills Library.
    expected_ui:
      - Setup screen no longer blocks the app.
      - Dashboard is reachable.
      - Settings shows the selected Skill Host Folder path.
      - Skills Library reflects the host scan state.
    cross_screen_checks:
      - Dashboard and Settings agree on the configured host path or host warning.
      - Skills Library state matches the actual host folder contents.
    verifier:
      app_db:
        - App settings contain the selected Skill Host Folder path.
      filesystem:
        - QA host folder still exists.
        - If the app creates `.agents/skills`, it is created only under the QA host folder.
      evidence:
        - Screenshot of Settings after setup.
        - DB query output for app settings.
        - "`find` or `ls` output for the QA host folder."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETUP-002
    title: Missing Skill Host Folder shows warnings without crashing
    tier: T1
    primary_screen: Dashboard
    related_screens: [Settings, Skills Library]
    type: edge
    tags: [setup, host, missing-path, warning, release-full]
    invariants: [INV-HOST-001]
    preconditions:
      - App has a configured QA Skill Host Folder.
      - The configured folder is moved or deleted outside the app.
    steps:
      - Launch the app.
      - Open Dashboard.
      - Open Settings.
      - Open Skills Library.
    expected_ui:
      - App does not crash.
      - Dashboard or Settings shows a clear missing host warning.
      - Skills Library does not show stale skills as current without a warning.
      - User has a visible path recovery action.
    cross_screen_checks:
      - Dashboard, Settings, and Skills Library agree that the host is missing.
    verifier:
      filesystem:
        - Configured host path is absent.
      evidence:
        - Screenshot of warning state.
        - Filesystem check output for the missing path.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETTINGS-001
    title: Change Skill Host Folder updates source of truth without relinking silently
    tier: T1
    primary_screen: Settings
    related_screens: [Dashboard, Skills Library, Project Detail]
    type: smoke
    tags: [settings, host, change-host, cross-screen, release-full]
    invariants: [INV-HOST-001, INV-INSTALL-001]
    preconditions:
      - App uses QA host folder A.
      - QA host folder B exists with a distinct skill list.
      - At least one project install may still point to host folder A.
    steps:
      - Open Settings.
      - Change Skill Host Folder to folder B.
      - Open Dashboard.
      - Open Skills Library.
      - Open a project with an existing install from folder A, if present.
    expected_ui:
      - Settings shows folder B as the current host.
      - Skills Library shows skills from folder B, not stale folder A contents.
      - Existing symlinks to folder A are not silently rewritten without user action.
      - Any old-host state is visible as a warning or distinct status.
    cross_screen_checks:
      - Dashboard and Skills Library agree on the new host scan state.
      - Project Detail does not claim old-host symlinks are current under folder B.
    verifier:
      app_db:
        - App settings contain host folder B.
      filesystem:
        - Folder A and folder B both remain intact.
        - Existing project symlink targets are unchanged unless a relink action was explicitly performed.
      evidence:
        - Screenshot of Settings and Skills Library.
        - DB query output for app settings.
        - "`readlink` output for any existing project symlink."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETTINGS-002
    title: Reset All Data clears Skillbox metadata without deleting real skill folders
    tier: T0
    primary_screen: Settings
    related_screens: [Setup, Dashboard, Skills Library, Projects, Global Plugins]
    type: critical
    tags: [settings, reset, data-integrity, destructive, release-full]
    invariants: [INV-HOST-001, INV-SAFETY-001]
    preconditions:
      - App runs with QA DB and QA fixture folders only.
      - QA host folder has at least one skill.
      - QA project has at least one scanned or installed skill.
    steps:
      - Open Settings.
      - Trigger Reset All Data from Danger Zone.
      - Confirm the destructive prompt.
      - Observe the app after reset.
      - Reopen Dashboard, Skills Library, Projects, and Global Plugins.
    expected_ui:
      - App returns to first-run or unconfigured state.
      - Projects and plugin scan data are gone from the UI.
      - No success state claims that filesystem sources were deleted.
    cross_screen_checks:
      - Dashboard, Projects, Skills Library, and Settings agree on the reset state.
    verifier:
      app_db:
        - Projects, skills, scan history, installs, and plugin scan tables are empty or reset.
        - App settings and network settings are at defaults.
      filesystem:
        - QA host skill folder still exists.
        - QA project folder still exists.
        - Provider config files are not modified unless the reset contract explicitly says so.
      evidence:
        - Screenshot after reset.
        - DB table count output.
        - "`find` output showing QA fixture folders still exist."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SETUP-003
    title: Re-point host folder while project installs exist keeps install records consistent
    tier: T0
    primary_screen: Settings
    related_screens: [Skills Library, Project Detail, Dashboard]
    type: critical
    tags: [setup, settings, host, change-host, install, data-integrity, release-full]
    invariants: [INV-HOST-001, INV-INSTALL-001, INV-DB-001, INV-SAFETY-001]
    preconditions:
      - App uses QA host folder A with at least one active project install.
      - QA host folder B exists and has a distinct valid skill list.
      - QA executor may mutate only run-local fixture copies.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - configure host A, host B, and a project fixture with one existing host-A install
    steps:
      - Open Settings.
      - Change the Skill Host Folder from host A to host B.
      - Run Skill Host Folder scan if it does not happen automatically.
      - Open Skills Library, Project Detail for the installed project, and Dashboard.
    expected_ui:
      - Settings shows host B as the current Skill Host Folder.
      - Skills Library lists host B skills and does not show host A skills as current host skills.
      - Project Detail does not silently rewrite the existing install target from host A to host B.
      - Existing host-A install state is shown as old-host, missing-host, or warning according to the product contract.
      - Dashboard counts remain coherent and do not double-count the same install.
    cross_screen_checks:
      - Settings, Skills Library, Project Detail, and Dashboard agree on the active host and install state.
    verifier:
      app_db:
        - App settings contain host B as the active Skill Host Folder.
        - The existing install row is preserved or explicitly marked stale/missing; no duplicate active install row is created.
        - Active install counts by project and mode are coherent after the re-point.
      filesystem:
        - Host A and host B fixture folders both remain on disk.
        - Existing project target still points to host A unless the user explicitly performed a relink/switch action.
        - No files are written outside the run-local release-cycle fixture.
      evidence:
        - Settings, Skills Library, and Project Detail screenshots after re-point.
        - DB query output for app settings, installs, and install counts.
        - "`readlink`/`stat` output for the existing project target and both host folders."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SETUP-004
    title: Host folder pointed at a file or nonexistent path is rejected and prior host is retained
    tier: T1
    primary_screen: Settings
    related_screens: [Setup, Skills Library]
    type: edge
    tags: [setup, settings, host, validation, missing-path, release-full]
    invariants: [INV-HOST-001, INV-SAFETY-001]
    preconditions:
      - App has a configured QA Skill Host Folder with at least one valid skill.
      - QA run has the host topology fixture copied into the run folder.
    data_setup:
      fixture_source: fixtures/qa/host-topologies
      copy_to: runs/<run-id>/fixtures/host-topologies
      mutate_copy:
        - use `host-is-file.txt` as the file-path variant and a run-local absent path as the nonexistent-path variant
    steps:
      - Open Settings.
      - Attempt to change Skill Host Folder to the run-local file path.
      - Attempt to change Skill Host Folder to the run-local nonexistent path.
      - Open Skills Library.
    expected_ui:
      - Each invalid path attempt shows a clear validation error or warning.
      - Settings continues to show the prior valid Skill Host Folder.
      - Skills Library still reflects the prior valid host, not the rejected path.
    verifier:
      app_db:
        - App settings retain the prior valid Skill Host Folder path.
      filesystem:
        - The file-path fixture remains a file.
        - The nonexistent path is not silently created unless the product explicitly labels it as a new host creation flow.
      evidence:
        - Settings validation screenshot for each variant.
        - DB query output for app settings.
        - "`stat` output for the file path and nonexistent path."
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-SETTINGS-003
    title: Re-point host to an empty folder shows zero host skills without dropping install metadata
    tier: T1
    primary_screen: Settings
    related_screens: [Skills Library, Project Detail, Dashboard]
    type: edge
    tags: [settings, host, empty-host, install, data-integrity, release-full]
    invariants: [INV-HOST-001, INV-INSTALL-001, INV-DB-001]
    preconditions:
      - App uses run-local release-cycle host A with at least one installed project skill.
      - QA run has an empty host fixture copied into the run folder.
    data_setup:
      fixture_sources:
        - fixtures/qa/release-cycle
        - fixtures/qa/host-topologies/empty-host
      copy_to:
        release_cycle: runs/<run-id>/fixtures/release-cycle
        empty_host: runs/<run-id>/fixtures/host-topologies/empty-host
      mutate_copy:
        - configure release-cycle host A as the active Skill Host Folder
        - add `project-with-install` as the QA project and create one managed install from host A inside the run-local project target
        - keep `.agents/skills` present and empty
    steps:
      - Confirm Project Detail shows the seeded managed install for `project-with-install`.
      - Open Settings.
      - Change Skill Host Folder to the empty host fixture.
      - Run host scan if needed.
      - Open Skills Library, Project Detail for the project with prior install metadata, and Dashboard.
    expected_ui:
      - Skills Library shows zero current host skills for the empty host.
      - Prior project install metadata is not silently deleted.
      - Old-host or missing-source state is visible where prior installs are shown.
      - Dashboard counts remain coherent and do not double-count old and empty host state.
    cross_screen_checks:
      - Settings, Skills Library, Project Detail, and Dashboard agree on the empty active host.
    verifier:
      app_db:
        - App settings point to the empty host.
        - Prior install rows remain present or are explicitly marked stale/missing according to contract.
        - No duplicate skill rows are created for the empty host.
      filesystem:
        - Empty host `.agents/skills` remains present and empty.
        - Prior release-cycle host and project fixture folders remain intact.
        - No files are written outside the run-local release-cycle and empty-host fixtures.
      evidence:
        - Screenshot or DB query proving the seeded install before re-point.
        - Settings, Skills Library, and Project Detail screenshots.
        - DB query output for settings, skills, and installs.
        - "`find` output for the empty host and prior install target."
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-SETTINGS-004
    title: Override pointing at a nonexistent path is rejected or flagged and scan behavior is unchanged
    tier: T1
    primary_screen: Settings
    related_screens: [Project Detail, Projects]
    type: edge
    tags: [settings, provider, path-override, nonexistent-path, validation, release-full]
    invariants: [INV-PROVIDER-001, INV-PROJECT-001, INV-SAFETY-001]
    preconditions:
      - QA project is registered and can be scanned with built-in provider paths.
      - QA executor may mutate only run-local fixture paths.
    data_setup:
      fixture_source: fixtures/qa/projects/generic-agents-project
      copy_to: runs/<run-id>/fixtures/projects/generic-agents-project
      mutate_copy:
        - choose a nonexistent run-local relative provider override path
    steps:
      - Open Settings provider path overrides.
      - Attempt to save the nonexistent project-scope provider skills path.
      - Run Project Detail scan for the same project.
      - Open Projects.
    expected_ui:
      - Settings either rejects the nonexistent override or clearly labels it as invalid.
      - Project scan behavior remains on the prior built-in path if the override was rejected.
      - No stale nonexistent path is presented as current provider state.
    cross_screen_checks:
      - Settings, Project Detail, and Projects agree on whether the override is active.
    verifier:
      app_db:
        - Rejected override creates no active provider_path_overrides row.
        - If the product stores the invalid override as flagged, scan facts show invalid/missing rather than current.
      filesystem:
        - Nonexistent override path remains absent unless the product explicitly creates provider structure in a later install flow.
        - No files are written outside the run-local project fixture.
      evidence:
        - Settings validation/flag screenshot.
        - Project Detail scan screenshot.
        - DB query output for provider_path_overrides and provider facts.
        - "`test -e` output for the nonexistent path."
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden
