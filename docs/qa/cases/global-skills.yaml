area: global-skills
cases:
  - id: TC-GLOBAL-001
    title: Global Skills scan shows an explicit state for every Settings provider registry row
    tier: T1
    primary_screen: Global Skills
    related_screens: [Dashboard, Settings]
    type: smoke
    tags: [global-skills, scan, provider, registry-coverage, cross-screen, release-full]
    invariants: [INV-GLOBAL-001, INV-PROVIDER-001]
    preconditions:
      - QA HOME contains approved global provider skill folders for at least one provider.
      - App runs with HOME pointing to the QA home fixture.
      - Settings provider registry has at least two providers (one global-capable, one not).
    steps:
      - Open Settings and note all providers visible in the provider registry.
      - Open Global Skills.
      - Run global scan.
      - Inspect all provider rows.
      - Return to Dashboard.
    expected_ui:
      - Every provider shown in Settings/provider registry appears in Global Skills after scan.
      - Global-capable providers show active, empty, missing, or a scan-state label.
      - Providers without global skills support show "no global skills" state.
      - Disabled providers show "disabled" state.
      - No provider in Settings/provider registry is silently absent from Global Skills.
    cross_screen_checks:
      - Dashboard Global Skills entry point remains consistent with scan status.
      - Settings provider list and Global Skills provider list cover the same provider set.
    verifier:
      app_db:
        - global_provider_locations has one row per provider definition in provider_definitions.
        - No provider_definitions row is absent from global_provider_locations after scan.
        - Global provider locations and global install rows match the UI.
      filesystem:
        - Listed paths exist under the copied QA home fixture.
      evidence:
        - Global Skills screenshot showing all provider rows.
        - Settings provider registry screenshot.
        - DB query output for global_provider_locations and provider_definitions counts.
        - Filesystem listing of global provider folders.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-GLOBAL-002
    title: Global Skills missing provider path reports warning without stale current entries
    tier: T1
    primary_screen: Global Skills
    related_screens: [Dashboard]
    type: edge
    tags: [global-skills, missing-path, warning, release-full]
    invariants: [INV-GLOBAL-001]
    preconditions:
      - App has scanned QA global provider skills.
      - The scanned global skills folder is moved or deleted outside the app.
    steps:
      - Open Global Skills.
      - Run global scan.
      - Open Dashboard.
    expected_ui:
      - Missing global path is visible as a warning or missing state.
      - Previously listed global skills are not presented as current without a warning.
      - App remains usable.
    verifier:
      app_db:
        - Global scan status is missing/unavailable for the provider.
      filesystem:
        - Configured global skills path is absent.
      evidence:
        - Global Skills warning screenshot.
        - DB status query output.
        - Filesystem missing-path check.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: forbidden

  - id: TC-GLOBAL-003
    title: Global external symlink is classified without following unsafe targets
    tier: T0
    primary_screen: Global Skills
    related_screens: [Settings]
    type: adversarial
    tags: [global-skills, symlink, path-escape, data-integrity, release-full]
    invariants: [INV-GLOBAL-001, INV-SAFETY-001]
    preconditions:
      - QA global provider skills folder contains a symlink pointing outside the approved QA fixture.
    steps:
      - Open Global Skills.
      - Run global scan.
      - Inspect the symlink row.
    expected_ui:
      - Symlink is labeled external, unsafe, or warning according to current product vocabulary.
      - App does not follow or mutate the external target.
      - No success state claims the external target is managed by Skillbox.
    verifier:
      filesystem:
        - Symlink target is outside the QA fixture and remains unchanged.
      app_db:
        - Entry status is not current/managed.
      evidence:
        - Screenshot of symlink classification.
        - "`readlink` output."
        - DB entry status output.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-GLOBAL-004
    title: Global scan respects disabled provider state
    tier: T1
    primary_screen: Global Skills
    related_screens: [Settings, Projects]
    type: smoke
    tags: [global-skills, provider-disabled, settings, release-full]
    invariants: [INV-PROVIDER-001, INV-GLOBAL-001]
    preconditions:
      - QA provider has visible global skill fixture data.
    steps:
      - Open Settings.
      - Disable the provider.
      - Run Global Skills scan.
      - Re-enable the provider.
    expected_ui:
      - Disabled provider is clearly labeled and excluded or marked disabled according to product contract.
      - Re-enabling restores scan eligibility.
      - Only the selected provider's state changes.
    verifier:
      app_db:
        - Provider user setting changes only for the selected provider.
      evidence:
        - Settings screenshot before/after.
        - Global Skills screenshot with provider disabled.
        - DB provider user settings output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-GLOBAL-005
    title: Global skill detail matches global list row and filesystem path
    tier: T2
    primary_screen: Global Skills
    related_screens: [Global Skill Detail]
    type: smoke
    tags: [global-skills, detail, filesystem, release-full]
    invariants: [INV-GLOBAL-001]
    preconditions:
      - QA global scan has at least one observed global skill.
    steps:
      - Open Global Skills.
      - Open one global skill detail or row expander if available.
      - Compare provider, name, status, and path.
    expected_ui:
      - Detail view/expanded row matches the selected list row.
      - Filesystem path exists or warning state explains why it does not.
    verifier:
      filesystem:
        - Selected path exists under QA home, or warning state matches absence.
      evidence:
        - List screenshot.
        - Detail/expanded row screenshot.
        - Filesystem path check.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-GLOBAL-006
    title: Global skills path that is a file or broken symlink reports without stale current entries
    tier: T1
    primary_screen: Global Skills
    related_screens: [Settings, Dashboard]
    type: adversarial
    tags: [global-skills, negative-topology, broken-symlink, file-path, stale-state, release-full]
    invariants: [INV-GLOBAL-001, INV-SAFETY-001, INV-DB-001]
    preconditions:
      - QA run has global malformed path fixture copied into the run folder.
      - QA executor may mutate only run-local global fixture paths.
    data_setup:
      fixture_source: fixtures/qa/global/skills-malformed
      copy_to: runs/<run-id>/fixtures/global/skills-malformed
      mutate_copy:
        - create variant A where the global skills path is a regular file
        - create variant B where the global skills path is a symlink to a deleted target
    steps:
      - Run the case once per variant.
      - Configure the provider global skills path to the run-local malformed path.
      - Open Global Skills and run global scan.
      - Open Settings and Dashboard.
    expected_ui:
      - Global Skills shows an empty, warning, or error state for the malformed path.
      - No stale current global skill entries are claimed from the malformed path.
      - Scan reaches a terminal state and does not stay stuck.
    cross_screen_checks:
      - Settings, Global Skills, and Dashboard agree that the provider has no current usable global skills for the malformed path.
    verifier:
      app_db:
        - No active/current global skill row is created from the malformed path.
        - No global scan operation remains queued or running after completion.
      filesystem:
        - Malformed file or broken symlink remains unchanged by scan.
        - No files are written outside the run-local global fixture.
      evidence:
        - Global Skills screenshot for each variant.
        - DB query output for global skills and operation state.
        - "`stat` and `readlink` output for each malformed path variant."
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-GLOBAL-007
    title: Global Skills accounts for every Settings provider registry provider with an explicit state
    tier: T1
    primary_screen: Global Skills
    related_screens: [Settings]
    type: invariant
    tags: [global-skills, registry-coverage, provider, release-full]
    invariants: [INV-GLOBAL-001, INV-PROVIDER-001]
    preconditions:
      - App is configured with a QA HOME fixture.
      - Settings provider registry contains at least: one global-capable provider, one non-global provider, one disabled provider.
    steps:
      - Open Settings and record all providers in the provider registry table.
      - Open Global Skills.
      - Run global scan.
      - Verify each Settings provider has a corresponding row in Global Skills.
    expected_ui:
      - Every provider in Settings/provider registry has an explicit state row in Global Skills.
      - Global-capable provider with a path: shows active, empty, missing, or error state.
      - Provider with no global skills support: shows "no global skills" state label.
      - Disabled provider: shows "disabled" state label.
      - Provider configured but path missing: shows "missing" state label.
      - No provider from the Settings registry is silently absent from Global Skills output.
    fail_criteria:
      - Any provider visible in Settings/provider registry has no corresponding row in Global Skills after scan.
      - Any provider row appears without an explicit, displayable status.
    verifier:
      app_db:
        - COUNT of provider_definitions equals COUNT of global_provider_locations after scan.
        - Each global_provider_locations row has a non-null, non-empty status string.
      evidence:
        - Global Skills full-list screenshot.
        - Settings provider registry screenshot.
        - DB query output comparing provider definitions to global locations, e.g. SELECT pd.key, gl.status FROM provider_definitions pd LEFT JOIN global_provider_locations gl ON gl.provider_definition_id = pd.id.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-GLOBAL-008
    title: Global Skills provider tabs show counts and empty states
    tier: T2
    primary_screen: Global Skills
    related_screens: []
    type: smoke
    tags: [global-skills, provider-tabs, counts, empty-state, release-full]
    invariants: [INV-GLOBAL-001]
    preconditions:
      - App has scanned global skills with at least two providers (one with skills, one without).
    steps:
      - Open Global Skills.
      - Run global scan if not yet scanned.
      - Inspect the provider tab bar.
      - Click each provider tab.
    expected_ui:
      - An "All" tab is visible with the total skill entry count.
      - Each provider has its own tab showing its skill entry count (may be 0).
      - Clicking a provider tab shows only that provider's location section.
      - A provider with 0 entries shows a clear empty state message in its tab view.
      - Clicking "All" restores all provider locations.
    verifier:
      evidence:
        - Screenshot of Global Skills tab bar with all provider tabs and counts.
        - Screenshot of a single-provider tab view.
        - Screenshot of a provider tab with 0 entries showing empty state.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only
