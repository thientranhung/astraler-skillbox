area: db-integrity
cases:
  - id: TC-DB-001
    title: Release QA database has no orphaned references after core workflows
    tier: T0
    primary_screen: Dashboard
    related_screens: [Projects, Skills Library, Global Plugins]
    type: critical
    tags: [db, integrity, foreign-keys, release-full]
    invariants: [INV-DB-001]
    preconditions:
      - Release QA core workflows have run against the QA DB.
    steps:
      - Open Dashboard and verify app loads.
      - Run DB integrity queries out of band.
    expected_ui:
      - App loads without database error screen.
      - User-visible counts are coherent.
    verifier:
      app_db:
        - "`PRAGMA foreign_key_check` returns no rows."
        - "`PRAGMA integrity_check` returns `ok`."
        - Active installs join to existing projects/providers/skills as expected.
      evidence:
        - Dashboard screenshot.
        - SQLite integrity query output.
    safety:
      destructive: false
      allowed_environment: qa_fixture
      real_environment: allowed_read_only

  - id: TC-DB-002
    title: Failed install leaves no active install metadata
    tier: T0
    primary_screen: Project Detail
    related_screens: [Add Skill Wizard]
    type: critical
    tags: [db, install, failure, data-integrity, release-full]
    invariants: [INV-INSTALL-001, INV-DB-001]
    preconditions:
      - QA install target has a conflict or read-only error.
    steps:
      - Attempt the failing install.
      - Reopen Project Detail.
      - Query DB out of band.
    expected_ui:
      - Failed skill is not shown as current/installed.
      - Error is visible.
    verifier:
      app_db:
        - No active install row exists for the failed operation.
        - Failed operation row contains an error.
      filesystem:
        - No partial target is created.
      evidence:
        - Error screenshot.
        - DB install/operation query output.
        - Filesystem target listing.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-DB-003
    title: Reset All Data clears metadata tables while preserving schema version
    tier: T0
    primary_screen: Settings
    related_screens: [Setup, Dashboard]
    type: critical
    tags: [db, reset, schema-version, data-integrity, release-full]
    invariants: [INV-DB-001, INV-SAFETY-001]
    preconditions:
      - QA DB contains projects, skills, installs, warnings, provider scans, and plugin scans.
    steps:
      - Trigger Reset All Data.
      - Relaunch or wait for app restart.
      - Query DB out of band.
    expected_ui:
      - App returns to first-run/unconfigured state.
      - No stale metadata is visible.
    verifier:
      app_db:
        - Metadata tables are empty or reset according to schema contract.
        - Schema migration version remains current.
      filesystem:
        - QA fixture folders remain on disk.
      evidence:
        - Post-reset screenshot.
        - DB table count and schema version output.
        - Filesystem listing.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-DB-004
    title: App reports corrupted QA DB without touching real app data
    tier: T1
    primary_screen: App Launch
    related_screens: [Setup]
    type: edge
    tags: [db, corrupted-db, launch, release-full]
    invariants: [INV-DB-001, INV-SAFETY-001]
    preconditions:
      - A copied QA DB file is replaced with invalid bytes inside the run folder.
    steps:
      - "Launch dev Electron or packaged app with `SKILLBOX_DB_PATH` pointing to the corrupted QA DB."
      - Observe startup.
    expected_ui:
      - App does not use real app data as fallback.
      - Startup error is visible and actionable.
      - No new DB is silently created outside the configured QA path.
    verifier:
      filesystem:
        - Configured corrupted DB path is under the run folder.
        - No real app data DB is modified.
      evidence:
        - Startup error screenshot or log.
        - Filesystem path check.
    safety:
      destructive: false
      allowed_environment: qa_fixture_only
      real_environment: forbidden

  - id: TC-DB-005
    title: Foreign-key and count consistency holds after a full add install remove reset cycle
    tier: T0
    primary_screen: Dashboard
    related_screens: [Setup, Projects, Project Detail, Skills Library, Settings]
    type: critical
    tags: [db, integrity, foreign-keys, lifecycle, reset, install, remove, release-full]
    invariants: [INV-DB-001, INV-INSTALL-001, INV-PROJECT-001, INV-SAFETY-001]
    preconditions:
      - App runs with QA DB, QA HOME, QA host fixture, and QA project fixture only.
      - QA executor may mutate only run-local fixture copies.
    data_setup:
      fixture_source: fixtures/qa/release-cycle
      copy_to: runs/<run-id>/fixtures/release-cycle
      mutate_copy:
        - start from an empty QA DB plus host/project fixtures for the full lifecycle
    steps:
      - Complete Setup by choosing the QA Skill Host Folder.
      - Scan the Skill Host Folder.
      - Add the QA project and scan it.
      - Install one QA host skill into the project.
      - Remove the installed skill.
      - Trigger Reset All Data and wait for the app to return to setup or unconfigured state.
      - Run DB and filesystem checks out of band.
    expected_ui:
      - Each workflow step reaches a terminal success or visible failure state.
      - After removal, the project no longer shows the skill as installed.
      - After reset, metadata-backed screens show an empty or setup state with no stale project, skill, install, or plugin counts.
      - No screen shows contradictory counts after the lifecycle.
    cross_screen_checks:
      - Dashboard, Projects, Project Detail, Skills Library, and Settings agree after install, after remove, and after reset.
    verifier:
      app_db:
        - "`PRAGMA foreign_key_check` returns no rows after install, after remove, and after reset."
        - "`PRAGMA integrity_check` returns `ok` after the full cycle."
        - Dashboard/count queries match source tables after install, remove, and reset.
        - No active install row remains after remove or reset.
      filesystem:
        - QA host skill folder remains intact after install, remove, and reset.
        - QA project folder remains intact after remove and reset.
        - Removed project install target is absent after remove.
        - No files are written outside the run-local release-cycle fixture.
      evidence:
        - Screenshots after install, remove, and reset.
        - DB integrity, FK, and table/count query output after each checkpoint.
        - Filesystem `find`/`stat` output for host, project, and install target.
    safety:
      destructive: true
      allowed_environment: qa_fixture_only
      real_environment: forbidden
