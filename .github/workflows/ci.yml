name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Go tests
        run: cd core-go && go test ./...

      - name: Typecheck
        working-directory: apps/desktop
        run: pnpm typecheck

      - name: Unit tests
        working-directory: apps/desktop
        run: pnpm test

      - name: Check contracts drift
        working-directory: apps/desktop
        run: pnpm check:contracts-drift
