name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Build Go sidecar (darwin/arm64)
        working-directory: core-go
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          go build -o ../apps/desktop/resources/core/skillbox-core ./cmd/skillbox-core/
          chmod 755 ../apps/desktop/resources/core/skillbox-core

      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite)
        working-directory: apps/desktop
        run: pnpm build

      - name: Generate icon
        working-directory: apps/desktop
        run: pnpm generate:icon

      # Required secrets: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
      - name: Build with electron-builder (mac arm64, with notarization)
        if: ${{ secrets.APPLE_ID != '' }}
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac --arm64 --config electron-builder.yml

      - name: Build with electron-builder (mac arm64, no notarization)
        if: ${{ secrets.APPLE_ID == '' }}
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --mac --arm64 --config electron-builder.yml -c.mac.notarize=false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: apps/desktop/dist/*.dmg

  build-mac-x64:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Build Go sidecar (darwin/amd64)
        working-directory: core-go
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -o ../apps/desktop/resources/core/skillbox-core ./cmd/skillbox-core/
          chmod 755 ../apps/desktop/resources/core/skillbox-core

      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite)
        working-directory: apps/desktop
        run: pnpm build

      - name: Generate icon
        working-directory: apps/desktop
        run: pnpm generate:icon

      # Required secrets: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
      - name: Build with electron-builder (mac x64, with notarization)
        if: ${{ secrets.APPLE_ID != '' }}
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac --x64 --config electron-builder.yml

      - name: Build with electron-builder (mac x64, no notarization)
        if: ${{ secrets.APPLE_ID == '' }}
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm exec electron-builder --mac --x64 --config electron-builder.yml -c.mac.notarize=false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: apps/desktop/dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Build Go sidecar (windows/amd64)
        working-directory: core-go
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        shell: pwsh
        run: |
          go build -o ..\apps\desktop\resources\core\skillbox-core.exe .\cmd\skillbox-core\
          Copy-Item ..\apps\desktop\resources\core\skillbox-core.exe ..\apps\desktop\resources\core\skillbox-core

      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite)
        working-directory: apps/desktop
        run: pnpm build

      - name: Generate icon
        working-directory: apps/desktop
        run: pnpm generate:icon

      - name: Build with electron-builder (win x64)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --x64 --config electron-builder.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: apps/desktop/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Build Go sidecar (linux/amd64)
        working-directory: core-go
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -o ../apps/desktop/resources/core/skillbox-core ./cmd/skillbox-core/
          chmod 755 ../apps/desktop/resources/core/skillbox-core

      - name: Install dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build (electron-vite)
        working-directory: apps/desktop
        run: pnpm build

      - name: Generate icon
        working-directory: apps/desktop
        run: pnpm generate:icon

      - name: Build with electron-builder (linux x64)
        working-directory: apps/desktop
        run: pnpm exec electron-builder --linux --x64 --config electron-builder.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Generate changelog with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="${{ steps.cliff.outputs.content }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ github.ref_name }}"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Astraler Skillbox ${{ github.ref_name }}" \
            --notes "$NOTES"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find dist-artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) | while read file; do
            gh release upload "${{ github.ref_name }}" "$file" --clobber
          done
